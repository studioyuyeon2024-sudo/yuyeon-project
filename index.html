<script type="module">
    // ... 초기화 및 설정 동일 ...
    const db = getFirestore(app);
    let currentTotalCount = 12; // 기본값

    // [핵심] 관리자 설정 인원수 실시간 감지
    onSnapshot(doc(db, "settings", "matching_status"), (snap) => {
        if (snap.exists()) {
            const data = snap.data();
            const newTotal = data.total_count || 12;
            
            // 인원수 설정이 바뀌었을 때만 그리드 재생성
            if (newTotal !== currentTotalCount) {
                currentTotalCount = newTotal;
                setupGrids(); // 그리드 다시 그리기
                updateTakenIds(); // 선점 번호 다시 확인
            }

            // 마감 상태 처리
            const isOpen = data.is_open;
            document.getElementById('status-bar').style.display = isOpen ? 'block' : 'none';
            document.getElementById('submit-btn').innerText = isOpen ? "접수 마감 (결과 확인 가능)" : "정보 제출하기";
        }
    });

    // 그리드 생성 함수 (인원수에 맞게 루프)
    const setupGrids = () => {
        const myGrid = document.getElementById('my-id-grid');
        const pickGrid = document.getElementById('pick-id-grid');
        myGrid.innerHTML = ""; // 초기화
        pickGrid.innerHTML = ""; // 초기화
        selectedPicks = []; // 선택 초기화

        for (let i = 1; i <= currentTotalCount; i++) {
            // 본인 번호 생성
            const mb = document.createElement('div'); mb.className = 'bubble'; mb.innerText = i;
            mb.onclick = () => handleIdClick(mb, i);
            myGrid.appendChild(mb);

            // 호감 번호 생성
            const pb = document.createElement('div'); pb.className = 'bubble'; pb.innerText = i;
            pb.onclick = () => {
                if (selectedPicks.includes(i)) { selectedPicks.splice(selectedPicks.indexOf(i), 1); pb.classList.remove('selected'); }
                else if (selectedPicks.length < 2) { selectedPicks.push(i); pb.classList.add('selected'); }
            };
            pickGrid.appendChild(pb);
        }
    };
    
    // ... 나머지 핸들러 및 제출 로직 동일 ...
</script>
