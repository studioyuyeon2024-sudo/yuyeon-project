<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Studio Yuyeon | 유연한 인연</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Noto+Sans+KR:wght@300;400;500;700&display=swap');
        
        /* [핵심] 모든 입력창 너비 100% 강제 고정 */
        body { background: #FDFBF6; font-family: 'Noto Sans KR', sans-serif; color: #333; display: flex; justify-content: center; padding: 10px; margin: 0; }
        .container { background: white; padding: 30px 20px; border-radius: 30px; box-shadow: 0 15px 40px rgba(0,0,0,0.06); width: 100%; max-width: 440px; text-align: center; border-top: 6px solid #1A237E; box-sizing: border-box; }
        .serif-title { font-family: 'Playfair Display', serif; font-size: 30px; color: #1A237E; margin-bottom: 8px; }
        .card { background: #FFFFFF; border: 1px solid #F0F0F0; padding: 22px; border-radius: 20px; margin-bottom: 20px; text-align: left; }
        
        /* 입력창 디자인 복구 */
        input[type="text"], input[type="tel"], select, textarea { 
            width: 100% !important; 
            padding: 15px !important; 
            border: 1px solid #E5E7EB !important; 
            border-radius: 12px !important; 
            font-size: 16px !important; 
            box-sizing: border-box !important; 
            background: #FAFAFA !important; 
            display: block !important; 
            margin-bottom: 15px;
        }
        textarea { min-height: 120px !important; resize: none; }

        /* 버블 그리드 가로 6열 정렬 */
        .bubble-grid { display: grid !important; grid-template-columns: repeat(6, 1fr) !important; gap: 10px; margin: 15px 0; }
        .bubble { aspect-ratio: 1; border-radius: 50%; background: #F8F9FA; border: 1px solid #E0E0E0; display: flex; align-items: center; justify-content: center; font-size: 14px; cursor: pointer; color: #666; }
        .bubble.selected { background: #1A237E; color: white; border-color: #1A237E; font-weight: bold; transform: scale(1.1); }

        #submit-btn { width: 100%; padding: 20px; border: none; border-radius: 15px; font-weight: bold; background: #1A237E; color: white; font-size: 17px; cursor: pointer; }
        .secondary-btn { width: 100%; padding: 15px; border: 1px solid #ddd; border-radius: 15px; background: white; color: #555; cursor: pointer; }
        .privacy-content { font-size: 11px; color: #777; text-align: left; height: 100px; overflow-y: auto; background: #f9f9f9; padding: 15px; border-radius: 12px; line-height: 1.6; }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="serif-title">Studio Yuyeon</h1>
        <p style="font-size: 13px; color: #888; margin-bottom: 30px;">당신의 유연한 인연을 찾아가는 시간</p>
        <div id="input-section">
            <form id="matching-form">
                <div class="card">
                    <label style="font-weight:600; font-size:14px; display:block; margin-bottom:8px;">성별</label>
                    <select id="user-gender"><option value="male">남성</option><option value="female">여성</option></select>
                    <label style="font-weight:600; font-size:14px; display:block; margin-bottom:8px;">본인 번호 (1~12번)</label>
                    <div class="bubble-grid" id="my-id-grid"></div><input type="hidden" id="user-id" required>
                    <label style="font-weight:600; font-size:14px; display:block; margin-bottom:8px;">본명</label>
                    <input type="text" id="user-real-name" placeholder="성함을 입력하세요" required>
                    <label style="font-weight:600; font-size:14px; display:block; margin-bottom:8px;">핸드폰 번호</label>
                    <input type="tel" id="user-phone" maxlength="13" placeholder="010-0000-0000" required>
                </div>
                <div class="card">
                    <label style="font-weight:600; font-size:14px; display:block; margin-bottom:8px;">호감 가는 이성 번호 (최대 2명)</label>
                    <div class="bubble-grid" id="pick-id-grid"></div>
                    <button type="button" id="skip-btn" class="secondary-btn">이번 기수에는 인연이 없었어요 ❄️</button>
                    <input type="hidden" id="is-skipping" value="false">
                </div>
                <div class="card">
                    <label style="font-weight:600; font-size:14px; display:block; margin-bottom:8px;">참여 후기 (선택)</label>
                    <textarea id="user-review" placeholder="오늘 데이팅은 어떠셨나요?"></textarea>
                </div>
                <div class="field" style="text-align:left; margin-bottom:20px;">
                    <label style="display:flex; align-items:center; gap:8px; cursor:pointer;"><input type="checkbox" id="privacy-check" style="width:20px; height:20px;"><span style="font-size:14px; font-weight:bold;">개인정보 수집 및 이용 동의 (필수)</span></label>
                    <div class="privacy-content">
                        <strong>1. 수집 항목:</strong> 성명, 성별, 연락처, 매칭 번호, 후기<br>
                        <strong>2. 이용 목적:</strong> 매칭 결과 분석 및 참가자 안내<br>
                        <strong>3. 보유 기간:</strong> <strong>행사 종료 및 결과 안내 즉시 파기</strong>
                    </div>
                </div>
                <button type="submit" id="submit-btn">정보 제출하기</button>
            </form>
        </div>
    </div>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, getDoc, doc, query, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyCy0qWrPE_aQGaKjJXIM_vgU8oO5Wq9mOI",
            authDomain: "my-dating-service.firebaseapp.com",
            projectId: "my-dating-service",
            storageBucket: "my-dating-service.firebasestorage.app",
            messagingSenderId: "231488184905",
            appId: "1:231488184905:web:d49b3e4f0ef35e524e5598"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const myGrid = document.getElementById('my-id-grid');
        const pickGrid = document.getElementById('pick-id-grid');
        const userIdInput = document.getElementById('user-id');
        let selectedPicks = [];

        for (let i = 1; i <= 12; i++) {
            const mb = document.createElement('div'); mb.className = 'bubble'; mb.innerText = i;
            mb.onclick = () => { document.querySelectorAll('#my-id-grid .bubble').forEach(el => el.classList.remove('selected')); mb.classList.add('selected'); userIdInput.value = i; };
            myGrid.appendChild(mb);
            const pb = document.createElement('div'); pb.className = 'bubble pick-bubble'; pb.innerText = i;
            pb.onclick = () => { 
                if (selectedPicks.includes(i)) selectedPicks = selectedPicks.filter(id => id !== i);
                else if (selectedPicks.length < 2) selectedPicks.push(i);
                updatePickView();
            };
            pickGrid.appendChild(pb);
        }
        function updatePickView() { document.querySelectorAll('.pick-bubble').forEach(b => b.classList.toggle('selected', selectedPicks.includes(parseInt(b.innerText)))); }
        
        document.getElementById('matching-form').onsubmit = async (e) => {
            e.preventDefault();
            const adminDoc = await getDoc(doc(db, "settings", "matching_status"));
            if (adminDoc.exists() && adminDoc.data().is_open) return alert("접수 마감!");
            if (!document.getElementById('privacy-check').checked) return alert("동의 필요!");
            
            await addDoc(collection(db, "participants"), {
                gender: document.getElementById('user-gender').value,
                myId: Number(userIdInput.value),
                realName: document.getElementById('user-real-name').value,
                phone: document.getElementById('user-phone').value,
                pickId1: selectedPicks[0] || null,
                pickId2: selectedPicks[1] || null,
                review: document.getElementById('user-review').value,
                createdAt: new Date()
            });
            alert("제출 완료!");
        };
    </script>
</body>
</html>
