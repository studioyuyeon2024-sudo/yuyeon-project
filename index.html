<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Studio Yuyeon | 프리미엄 매칭</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="container">
        <h1 class="serif-title">Studio Yuyeon</h1>
        <p class="subtitle">당신의 유연한 인연을 찾아가는 시간</p>
        <div id="input-section">
            <form id="matching-form">
                <div class="card">
                    <div class="field"><label>성별</label><select id="user-gender"><option value="male">남성</option><option value="female">여성</option></select></div>
                    <div class="field"><label>본인 번호 (1~12번)</label><div class="bubble-grid" id="my-id-grid"></div><input type="hidden" id="user-id" required></div>
                    <div class="field"><label>본명</label><input type="text" id="user-real-name" placeholder="성함을 입력하세요" required></div>
                    <div class="field"><label>핸드폰 번호</label><input type="tel" id="user-phone" maxlength="13" placeholder="010-0000-0000" required></div>
                </div>
                <div class="card" id="preference-card">
                    <label>호감 가는 이성 번호 (최대 2명)</label>
                    <div class="bubble-grid" id="pick-id-grid"></div>
                    <div style="text-align:center; margin:15px 0; color:#ccc; font-size:12px;">또는</div>
                    <button type="button" id="skip-btn" class="secondary-btn">이번 기수에는 인연이 없었어요 ❄️</button>
                    <input type="hidden" id="is-skipping" value="false">
                </div>
                <div class="field"><label>참여 후기 (선택)</label><textarea id="user-review" rows="2" placeholder="오늘 데이팅은 어떠셨나요?"></textarea></div>
                <div class="field">
                    <label style="display:flex; align-items:center; gap:8px; cursor:pointer;"><input type="checkbox" id="privacy-check" style="width:18px; height:18px;"><span style="font-size:13px; font-weight:bold;">개인정보 수집 및 이용 동의 (필수)</span></label>
                    <div class="privacy-content">
                        <strong>1. 수집 항목:</strong> 성명, 성별, 연락처, 매칭 번호, 후기<br>
                        <strong>2. 이용 목적:</strong> 매칭 결과 분석 및 참가자 안내<br>
                        <strong>3. 보유 기간:</strong> <strong>행사 종료 및 결과 안내 즉시 파기</strong><br>
                        <strong>4. 동의 거부:</strong> 거부 시 서비스 이용이 제한됩니다.
                    </div>
                </div>
                <div style="margin-top:20px;">
                    <button type="submit" id="submit-btn">1. 정보 제출하기</button>
                    <button type="button" id="withdraw-btn" style="display:none; background:#e74c3c; color:white;">제출 정보 회수하기</button>
                    <button type="button" id="check-result-btn">2. 결과 확인하기</button>
                </div>
            </form>
        </div>
        <div id="result-section" style="display:none;">
            <h2 id="status-message" class="serif-title" style="font-size:24px;">분석 중...</h2>
            <div id="match-list-area"></div>
            <button onclick="location.reload()" style="width:100%; padding:15px; border:none; background:#eee; border-radius:12px;">처음으로</button>
        </div>
    </div>
    <script type="module" src="./script.js"></script>
</body>
</html>
