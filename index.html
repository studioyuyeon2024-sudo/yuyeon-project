<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Studio Yuyeon | 유연한 인연</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Noto+Sans+KR:wght@300;400;500;700&display=swap');
        body { background: #FDFBF6; font-family: 'Noto Sans KR', sans-serif; color: #333; display: flex; justify-content: center; padding: 10px; margin: 0; }
        .container { background: white; padding: 30px 20px; border-radius: 30px; box-shadow: 0 15px 40px rgba(0,0,0,0.06); width: 100%; max-width: 440px; text-align: center; border-top: 6px solid #1A237E; box-sizing: border-box; }
        .serif-title { font-family: 'Playfair Display', serif; font-size: 30px; color: #1A237E; margin-bottom: 8px; }
        .card { background: #FFFFFF; border: 1px solid #F0F0F0; padding: 22px; border-radius: 20px; margin-bottom: 20px; text-align: left; width: 100%; box-sizing: border-box; }
        input, select, textarea { width: 100% !important; padding: 15px !important; border: 1px solid #E5E7EB !important; border-radius: 12px !important; font-size: 16px !important; box-sizing: border-box; background: #FAFAFA !important; margin-bottom: 10px; }
        .bubble-grid { display: grid !important; grid-template-columns: repeat(6, 1fr) !important; gap: 10px; margin: 15px 0; }
        .bubble { aspect-ratio: 1; border-radius: 50%; background: #F8F9FA; border: 1px solid #E0E0E0; display: flex; align-items: center; justify-content: center; font-size: 14px; cursor: pointer; transition: 0.2s; }
        .bubble.selected { background: #1A237E !important; color: white !important; font-weight: bold; transform: scale(1.1); }
        #status-bar { display: none; background: #FF5252; color: white; padding: 10px; border-radius: 10px; font-size: 13px; font-weight: bold; margin-bottom: 15px; animation: blink 2s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
        
        /* 채팅방 스타일 */
        #chat-section { display: none; text-align: left; }
        #chat-box { height: 400px; overflow-y: auto; border: 1px solid #eee; padding: 15px; border-radius: 20px; background: #f9f9fb; margin-bottom: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 80%; padding: 10px 15px; border-radius: 15px; font-size: 14px; line-height: 1.5; }
        .msg.me { align-self: flex-end; background: #1A237E; color: white; border-bottom-right-radius: 2px; }
        .msg.other { align-self: flex-start; background: white; color: #333; border: 1px solid #eee; border-bottom-left-radius: 2px; }
        
        .privacy-content { font-size: 11px; color: #777; height: 100px; overflow-y: auto; background: #f9f9f9; padding: 15px; border-radius: 12px; border: 1px solid #eee; margin-top: 10px; }
        #result-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; }
        .modal-content { background: white; padding: 30px; border-radius: 25px; width: 100%; max-width: 350px; text-align: center; }
        .btn-main { width: 100%; padding: 20px; border: none; border-radius: 15px; font-weight: bold; background: #1A237E; color: white; font-size: 16px; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="serif-title">Studio Yuyeon</h1>
        <div id="status-bar">📢 매칭 결과가 공개되었습니다! 결과를 확인하세요.</div>
        
        <div id="input-section">
            <form id="matching-form">
                <div class="card">
                    <label style="font-weight:bold; font-size:14px;">성별</label>
                    <select id="user-gender"><option value="male">남성</option><option value="female">여성</option></select>
                    <label style="font-weight:bold; font-size:14px;">본인 번호</label>
                    <div class="bubble-grid" id="my-id-grid"></div>
                    <input type="hidden" id="user-id" required>
                    <input type="text" id="user-real-name" placeholder="본명" required>
                    <input type="tel" id="user-birth" maxlength="10" placeholder="생년월일(1900-00-00)" required>
                    <input type="tel" id="user-phone" maxlength="13" placeholder="핸드폰 번호" required>
                </div>
                <div class="card">
                    <label style="font-weight:bold; font-size:14px;">호감 이성 번호 (최대 2명)</label>
                    <div class="bubble-grid" id="pick-id-grid"></div>
                </div>
                <div class="card">
                    <label style="font-weight:bold; font-size:14px;">참여 후기 (선택)</label>
                    <textarea id="user-review" placeholder="오늘 유연 데이팅은 어떠셨나요?"></textarea>
                </div>
                <div style="text-align:left; margin:20px 0;">
                    <label style="display:flex; align-items:center; gap:8px; cursor:pointer;">
                        <input type="checkbox" id="privacy-check" style="width:20px; height:20px; margin:0;">
                        <span style="font-size:14px; font-weight:bold; color:#1A237E;">개인정보 수집 및 이용 동의 (필수)</span>
                    </label>
                    <div class="privacy-content">
                        <strong>1. 수집 항목:</strong> 이름, 성별, 연락처 등<br>
                        <strong>2. 이용 목적:</strong> 매칭 분석 및 <strong>기수 모집 안내(마케팅)</strong><br>
                        <strong>3. 보유 기간:</strong> <strong>수집일로부터 1년 보관 후 파기</strong><br>
                        <strong>4. 동의 거부:</strong> 거부 시 매칭 결과 확인이 불가능합니다.
                    </div>
                </div>
                <button type="submit" class="btn-main" id="submit-btn">정보 제출하기</button>
                <button type="button" id="withdraw-btn" style="width:100%; padding:15px; border:none; border-radius:15px; background:#e74c3c; color:white; font-size:14px; margin-top:10px; display:none;">⚠️ 정보 회수하고 다시 쓰기</button>
                <button type="button" class="btn-main" id="check-result-btn" style="background:white; color:#1A237E; border:1.5px solid #1A237E;">결과 확인하기</button>
            </form>
        </div>

        <div id="result-modal">
            <div class="modal-content">
                <h3 style="color: #1A237E; margin-bottom: 10px;">결과 조회</h3>
                <p style="font-size: 13px; color: #888; margin-bottom: 20px;">제출하셨던 연락처를 입력하세요.</p>
                <input type="tel" id="verify-phone" maxlength="13" style="text-align: center; font-size: 18px;">
                <button id="confirm-verify-btn" class="btn-main">결과 보기</button>
                <p onclick="document.getElementById('result-modal').style.display='none'" style="margin-top: 15px; color: #aaa; font-size: 12px; cursor: pointer;">닫기</p>
            </div>
        </div>

        <div id="result-section" style="display:none;">
            <h2 class="serif-title">매칭 결과</h2>
            <div id="match-list-area"></div>
            <button onclick="location.reload()" style="width:100%; padding:15px; border:none; background:#eee; border-radius:12px; margin-top:20px;">처음으로</button>
        </div>

        <div id="chat-section">
            <h2 class="serif-title" style="font-size:20px;" id="chat-title">커플 전용 채팅방</h2>
            <p style="font-size:11px; color:#e74c3c; margin-bottom:10px;">⚠️ 이 채팅방은 24시간 뒤 자동 폐쇄됩니다.</p>
            <div id="chat-box"></div>
            <div style="display:flex; gap:10px;">
                <input type="text" id="chat-input" placeholder="메시지를 입력하세요..." style="margin-bottom:0;">
                <button id="send-msg-btn" style="padding:15px; background:#1A237E; color:white; border:none; border-radius:12px; white-space:nowrap;">전송</button>
            </div>
            <button onclick="location.reload()" style="width:100%; padding:10px; border:none; background:#f4f4f4; border-radius:10px; margin-top:15px; font-size:12px; color:#888;">조회 화면으로 나가기</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDoc, doc, getDocs, query, where, deleteDoc, onSnapshot, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        
        const firebaseConfig = { apiKey: "AIzaSyCy0qWrPE_aQGaKjJXIM_vgU8oO5Wq9mOI", authDomain: "my-dating-service.firebaseapp.com", projectId: "my-dating-service", storageBucket: "my-dating-service.firebasestorage.app", messagingSenderId: "231488184905", appId: "1:231488184905:web:d49b3e4f0ef35e524e5598" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const phoneInput = document.getElementById('user-phone');
        const verifyPhoneInput = document.getElementById('verify-phone');
        const chatBox = document.getElementById('chat-box');
        const chatInput = document.getElementById('chat-input');
        
        let myId, myGender, currentChatId, chatUnsubscribe;
        let currentTotalCount = 0, isResultsRevealed = false;

        // 초기 설정 감시
        onSnapshot(doc(db, "settings", "matching_status"), (snap) => {
            if (snap.exists()) {
                const data = snap.data();
                currentTotalCount = data.total_count || 12;
                isResultsRevealed = data.is_open;
                document.getElementById('status-bar').style.display = (isResultsRevealed && document.getElementById('result-section').style.display === 'none') ? 'block' : 'none';
                setupGrids();
            }
        });

        // 010- 자동 입력 및 포맷팅
        const setupPhoneFormat = (input) => {
            input.addEventListener('input', (e) => {
                let v = e.target.value.replace(/[^0-9]/g, '');
                if (input.id === 'verify-phone') {
                    if (v.length < 3) v = '010';
                    else if (v.substring(0,3) !== '010') v = '010' + v;
                }
                if (v.length <= 3) e.target.value = v;
                else if (v.length <= 7) e.target.value = v.slice(0, 3) + '-' + v.slice(3);
                else e.target.value = v.slice(0, 3) + '-' + v.slice(3, 7) + '-' + v.slice(7, 11);
            });
        };
        setupPhoneFormat(phoneInput);
        setupPhoneFormat(verifyPhoneInput);

        const setupGrids = () => {
            const myGrid = document.getElementById('my-id-grid');
            const pickGrid = document.getElementById('pick-id-grid');
            myGrid.innerHTML = ""; pickGrid.innerHTML = "";
            for (let i = 1; i <= currentTotalCount; i++) {
                const mb = document.createElement('div'); mb.className = 'bubble'; mb.innerText = i;
                mb.onclick = () => {
                    document.querySelectorAll('#my-id-grid .bubble').forEach(x => x.classList.remove('selected'));
                    mb.classList.add('selected'); document.getElementById('user-id').value = i;
                };
                myGrid.appendChild(mb);
                const pb = document.createElement('div'); pb.className = 'bubble'; pb.innerText = i;
                pb.onclick = () => pb.classList.toggle('selected');
                pickGrid.appendChild(pb);
            }
        };

        document.getElementById('matching-form').onsubmit = async (e) => {
            e.preventDefault();
            if (!document.getElementById('privacy-check').checked) return alert("동의 필요!");
            const myNum = Number(document.getElementById('user-id').value);
            const picks = Array.from(document.querySelectorAll('#pick-id-grid .bubble.selected')).map(b => Number(b.innerText));
            await addDoc(collection(db, "participants"), {
                gender: document.getElementById('user-gender').value, myId: myNum, realName: document.getElementById('user-real-name').value,
                phone: phoneInput.value, pickId1: picks[0] || null, pickId2: picks[1] || null, createdAt: new Date()
            });
            alert("제출 완료!"); location.reload();
        };

        document.getElementById('check-result-btn').onclick = () => {
            if (!isResultsRevealed) return alert("공개 전입니다!");
            document.getElementById('result-modal').style.display = 'flex';
            verifyPhoneInput.value = "010-"; verifyPhoneInput.focus();
        };

        document.getElementById('confirm-verify-btn').onclick = async () => {
            const phone = verifyPhoneInput.value;
            const snap = await getDocs(query(collection(db, "participants"), where("phone", "==", phone)));
            if (snap.empty) return alert("등록된 정보가 없습니다.");
            
            const myData = snap.docs[0].data();
            myId = myData.myId; myGender = myData.gender;
            const opposites = (await getDocs(collection(db, "participants"))).docs.map(d => d.data()).filter(p => p.gender !== myGender);
            const matched = opposites.filter(p => (p.pickId1 === myId || p.pickId2 === myId) && [myData.pickId1, myData.pickId2].includes(p.myId));
            
            document.getElementById('result-modal').style.display = 'none';
            document.getElementById('input-section').style.display = 'none';
            document.getElementById('status-bar').style.display = 'none';
            document.getElementById('result-section').style.display = 'block';
            
            const area = document.getElementById('match-list-area');
            area.innerHTML = `<div style="background:#FFF9E6; padding:20px; border-radius:20px; margin-bottom:20px;">나의 득표수: <b>${opposites.filter(p => p.pickId1 === myId || p.pickId2 === myId).length}표</b></div>`;
            
            if (matched.length > 0) {
                area.innerHTML += `<h3 style="color:#FF5252;">🎉 매칭 성공!</h3>`;
                matched.forEach(p => {
                    const chatId = myGender === 'male' ? `${myId}_${p.myId}` : `${p.myId}_${myId}`;
                    area.innerHTML += `
                        <div style='background:white; border:1px solid #eee; padding:20px; border-radius:15px; margin-bottom:12px;'>
                            <div style='font-weight:bold; margin-bottom:10px;'>💖 ${p.myId}번님과 매칭!</div>
                            <button onclick="window.enterChat('${chatId}', '${p.myId}')" style="width:100%; padding:12px; background:#1A237E; color:white; border:none; border-radius:10px; cursor:pointer;">커플 대화방 입장하기</button>
                        </div>`;
                });
            } else {
                area.innerHTML += `<div style='background:#f4f4f4; padding:20px; border-radius:15px; color:#666;'>다음번에 더 좋은 인연으로 뵐게요.</div>`;
            }
        };

        // 채팅방 입장 함수 (전역 등록)
        window.enterChat = (chatId, otherId) => {
            currentChatId = chatId;
            document.getElementById('result-section').style.display = 'none';
            document.getElementById('chat-section').style.display = 'block';
            document.getElementById('chat-title').innerText = `${otherId}번님과의 대화방`;
            
            if (chatUnsubscribe) chatUnsubscribe();
            const q = query(collection(db, "chats", chatId, "messages"), orderBy("createdAt", "asc"));
            chatUnsubscribe = onSnapshot(q, (snap) => {
                chatBox.innerHTML = "";
                snap.forEach(msgDoc => {
                    const msgData = msgDoc.data();
                    const div = document.createElement('div');
                    div.className = `msg ${msgData.senderId === myId ? 'me' : 'other'}`;
                    div.innerText = msgData.text;
                    chatBox.appendChild(div);
                });
                chatBox.scrollTop = chatBox.scrollHeight;
            });
        };

        document.getElementById('send-msg-btn').onclick = async () => {
            const text = chatInput.value.trim();
            if (!text || !currentChatId) return;
            chatInput.value = "";
            await addDoc(collection(db, "chats", currentChatId, "messages"), {
                senderId: myId, text: text, createdAt: serverTimestamp()
            });
        };

        chatInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') document.getElementById('send-msg-btn').click(); });
    </script>
</body>
</html>
