<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Studio Yuyeon | 유연한 인연</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Noto+Sans+KR:wght@300;400;500;700&display=swap');
        body { background: #FDFBF6; font-family: 'Noto Sans KR', sans-serif; color: #333; display: flex; justify-content: center; padding: 10px; margin: 0; }
        .container { background: white; padding: 30px 20px; border-radius: 30px; box-shadow: 0 15px 40px rgba(0,0,0,0.06); width: 100%; max-width: 440px; text-align: center; border-top: 6px solid #1A237E; box-sizing: border-box; }
        .serif-title { font-family: 'Playfair Display', serif; font-size: 30px; color: #1A237E; margin-bottom: 8px; }
        .card { background: #FFFFFF; border: 1px solid #F0F0F0; padding: 22px; border-radius: 20px; margin-bottom: 20px; text-align: left; width: 100%; box-sizing: border-box; }
        label { font-weight: 600; font-size: 14px; color: #2C3E50; display: block; margin-bottom: 8px; }
        input, select, textarea { width: 100% !important; padding: 15px !important; border: 1px solid #E5E7EB !important; border-radius: 12px !important; font-size: 16px !important; box-sizing: border-box; background: #FAFAFA !important; margin-bottom: 10px; }
        .bubble-grid { display: grid !important; grid-template-columns: repeat(6, 1fr) !important; gap: 10px; margin: 15px 0; }
        .bubble { aspect-ratio: 1; border-radius: 50%; background: #F8F9FA; border: 1px solid #E0E0E0; display: flex; align-items: center; justify-content: center; font-size: 14px; cursor: pointer; transition: 0.2s; }
        .bubble.selected { background: #1A237E !important; color: white !important; font-weight: bold; transform: scale(1.1); }
        
        #status-bar { display: none; background: #FF5252; color: white; padding: 10px; border-radius: 10px; font-size: 13px; font-weight: bold; margin-bottom: 15px; animation: blink 2s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
        
        #chat-section { display: none; text-align: left; }
        #chat-box { height: 480px; overflow-y: auto; border: 1px solid #eee; padding: 15px; border-radius: 20px; background: #f9f9fb; margin-bottom: 15px; display: flex; flex-direction: column; gap: 15px; }
        .msg-wrapper { display: flex; flex-direction: column; gap: 4px; max-width: 80%; }
        .msg-wrapper.me { align-self: flex-end; align-items: flex-end; }
        .msg-wrapper.other { align-self: flex-start; align-items: flex-start; }
        .msg-label { font-size: 10px; color: #888; font-weight: bold; margin: 0 4px; }
        .msg { padding: 10px 14px; border-radius: 18px; font-size: 14px; line-height: 1.5; word-break: break-all; }
        .msg-wrapper.me .msg { background: #1A237E; color: white; border-bottom-right-radius: 2px; }
        .msg-wrapper.other .msg { background: #E9ECEF; color: #333; border-bottom-left-radius: 2px; }
        
        .privacy-box { border: 1.5px solid #E5E7EB; border-radius: 15px; background: #F9FAFB; padding: 15px; margin-top: 10px; }
        .privacy-text { font-size: 11px; color: #666; height: 100px; overflow-y: auto; line-height: 1.6; text-align: left; }
        
        #result-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; }
        .modal-content { background: white; padding: 30px; border-radius: 25px; width: 100%; max-width: 350px; text-align: center; }
        .btn-main { width: 100%; padding: 20px; border: none; border-radius: 15px; font-weight: bold; background: #1A237E; color: white; font-size: 16px; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        .btn-main:disabled { background: #ccc; cursor: not-allowed; }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="serif-title">Studio Yuyeon</h1>
        <div id="status-bar">📢 매칭 결과가 공개되었습니다! 결과를 확인하세요.</div>
        
        <div id="input-section">
            <form id="matching-form">
                <div class="card">
                    <label>성별</label>
                    <select id="user-gender"><option value="male">남성</option><option value="female">여성</option></select>
                    <label>본인 번호</label>
                    <div class="bubble-grid" id="my-id-grid"></div>
                    <input type="hidden" id="user-id" required>
                    <label>기본 정보</label>
                    <input type="text" id="user-real-name" placeholder="본명" required>
                    <input type="tel" id="user-birth" maxlength="10" placeholder="생년월일(1900-00-00)" required>
                    <input type="tel" id="user-phone" maxlength="13" placeholder="예: 010-0000-0000" required>
                </div>
                <div class="card"><label>호감 이성 번호 (최대 2명)</label><div class="bubble-grid" id="pick-id-grid"></div></div>
                <div class="card"><label>참여 후기 (선택)</label><textarea id="user-review" placeholder="오늘 유연 데이팅은 어떠셨나요?"></textarea></div>
                
                <div class="card">
                    <label style="display:flex; align-items:center; gap:8px; cursor:pointer;">
                        <input type="checkbox" id="privacy-check" style="width:20px; height:20px; margin:0;">
                        <span style="color:#1A237E; font-size:14px; font-weight:bold;">개인정보 수집 및 이용 동의 (필수)</span>
                    </label>
                    <div class="privacy-box">
                        <div class="privacy-text">
                            <strong>1. 수집 항목:</strong> 성명, 성별, 생년월일, 연락처, 매칭 번호, 참여 후기<br>
                            <strong>2. 이용 목적:</strong> 매칭 결과 분석 및 <strong>스튜디오 유연 모집/안내 소식 발송</strong><br>
                            <strong>3. 보유 기간:</strong> <strong>참여일로부터 1년간 보관</strong> 후 즉시 파기<br>
                            <strong>4. 거부 권리:</strong> 동의를 거부할 수 있으나, 거부 시 서비스 이용이 제한됩니다.
                        </div>
                    </div>
                </div>

                <button type="submit" class="btn-main" id="submit-btn">정보 제출하기</button>
                <button type="button" id="withdraw-btn" style="width:100%; padding:15px; border:none; border-radius:15px; background:#e74c3c; color:white; font-size:14px; margin-top:10px; display:none;">⚠️ 내 정보 회수하고 다시 쓰기</button>
                <button type="button" class="btn-main" id="check-result-btn" style="background:white; color:#1A237E; border:1.5px solid #1A237E;">결과 확인하기</button>
            </form>
        </div>

        <div id="result-modal">
            <div class="modal-content">
                <h3 style="color: #1A237E; margin-bottom: 10px;">결과 조회</h3>
                <p style="font-size: 13px; color: #888; margin-bottom: 20px;">제출하셨던 연락처를 입력하세요.</p>
                <input type="tel" id="verify-phone" maxlength="13" placeholder="010-0000-0000">
                <button id="confirm-verify-btn" class="btn-main">결과 보기</button>
                <p onclick="document.getElementById('result-modal').style.display='none'" style="margin-top: 15px; color: #aaa; font-size: 12px; cursor: pointer;">닫기</p>
            </div>
        </div>

        <div id="result-section" style="display:none;">
            <h2 class="serif-title">매칭 결과</h2>
            <div id="match-list-area"></div>
            <button onclick="location.reload()" style="width:100%; padding:15px; border:none; background:#eee; border-radius:12px; margin-top:20px;">처음으로</button>
        </div>

        <div id="chat-section">
            <div id="cookie-notice">대화 쿠키를 모두 사용하시거나 3일이 경과하면 대화창이 종료됩니다 :)</div>
            <div id="chat-box"></div>
            <div style="display:flex; gap:10px;">
                <input type="text" id="chat-input" placeholder="메시지를 입력하세요..." style="margin-bottom:0;">
                <button id="send-msg-btn" style="padding:15px; background:#1A237E; color:white; border:none; border-radius:12px; white-space:nowrap;">전송</button>
            </div>
            <button onclick="location.reload()" style="width:100%; padding:10px; border:none; background:#f4f4f4; border-radius:10px; margin-top:15px; font-size:12px; color:#888;">조회 화면으로 나가기</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDoc, doc, getDocs, query, where, deleteDoc, onSnapshot, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        
        const firebaseConfig = { apiKey: "AIzaSyCy0qWrPE_aQGaKjJXIM_vgU8oO5Wq9mOI", authDomain: "my-dating-service.firebaseapp.com", projectId: "my-dating-service", storageBucket: "my-dating-service.firebasestorage.app", messagingSenderId: "231488184905", appId: "1:231488184905:web:d49b3e4f0ef35e524e5598" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const genderSelect = document.getElementById('user-gender');
        const phoneInput = document.getElementById('user-phone');
        const birthInput = document.getElementById('user-birth');
        const verifyPhoneInput = document.getElementById('verify-phone');
        const withdrawBtn = document.getElementById('withdraw-btn');
        const chatBox = document.getElementById('chat-box');
        const chatInput = document.getElementById('chat-input');
        
        let myId, myGender, currentChatId, chatUnsubscribe, myCreatedAt;
        let currentTotalCount = 0, isResultsRevealed = false, takenIds = [];
        const COOKIE_LIMIT = 500;

        phoneInput.value = "010-";

        // [복구] 하이픈 자동 생성 공통 함수
        const applyFormat = (input, type) => {
            input.addEventListener('input', (e) => {
                let v = e.target.value.replace(/[^0-9]/g, '');
                if (type === 'phone') {
                    if (v.length < 3) v = '010';
                    else if (v.substring(0,3) !== '010') v = '010' + v;
                    if (v.length <= 3) e.target.value = v;
                    else if (v.length <= 7) e.target.value = v.slice(0, 3) + '-' + v.slice(3);
                    else e.target.value = v.slice(0, 3) + '-' + v.slice(3, 7) + '-' + v.slice(7, 11);
                } else if (type === 'birth') {
                    if (v.length <= 4) e.target.value = v;
                    else if (v.length <= 6) e.target.value = v.slice(0, 4) + '-' + v.slice(4);
                    else e.target.value = v.slice(0, 4) + '-' + v.slice(4, 6) + '-' + v.slice(6, 8);
                }
            });
        };
        applyFormat(phoneInput, 'phone');
        applyFormat(verifyPhoneInput, 'phone');
        applyFormat(birthInput, 'birth');

        onSnapshot(doc(db, "settings", "matching_status"), (snap) => {
            if (snap.exists()) {
                const data = snap.data();
                currentTotalCount = data.total_count || 12;
                isResultsRevealed = data.is_open;
                document.getElementById('status-bar').style.display = (isResultsRevealed && document.getElementById('result-section').style.display === 'none') ? 'block' : 'none';
                document.getElementById('submit-btn').innerText = isResultsRevealed ? "접수 마감됨" : "정보 제출하기";
                document.getElementById('submit-btn').disabled = isResultsRevealed;
                setupGrids();
                updateTakenIds();
            }
        });

        // [수정] 성별 선택 시 해당 성별의 점유 번호만 가져와서 충돌 방지
        async function updateTakenIds() {
            const q = query(collection(db, "participants"), where("gender", "==", genderSelect.value));
            const snap = await getDocs(q);
            takenIds = snap.docs.map(d => Number(d.data().myId));
        }
        genderSelect.onchange = updateTakenIds;

        const setupGrids = () => {
            const myGrid = document.getElementById('my-id-grid');
            const pickGrid = document.getElementById('pick-id-grid');
            myGrid.innerHTML = ""; pickGrid.innerHTML = "";
            for (let i = 1; i <= currentTotalCount; i++) {
                const mb = document.createElement('div');
                mb.className = 'bubble'; // 회색 반전 로직 제거
                mb.innerText = i;
                mb.onclick = () => {
                    // [수정] 성별 내 중복 시 알림 문구만 노출
                    if (takenIds.includes(i) && !isResultsRevealed) alert("본인의 번호가 맞는 지 확인해 주세요.");
                    document.querySelectorAll('#my-id-grid .bubble').forEach(x => x.classList.remove('selected'));
                    mb.classList.add('selected'); document.getElementById('user-id').value = i;
                };
                myGrid.appendChild(mb);
                const pb = document.createElement('div'); pb.className = 'bubble'; pb.innerText = i;
                pb.onclick = () => pb.classList.toggle('selected');
                pickGrid.appendChild(pb);
            }
        };

        document.getElementById('matching-form').onsubmit = async (e) => {
            e.preventDefault();
            if (isResultsRevealed) return alert("접수가 이미 마감되었습니다.");
            if (!document.getElementById('privacy-check').checked) return alert("개인정보 동의가 필요합니다.");
            const myNum = Number(document.getElementById('user-id').value);
            if(!myNum) return alert("본인의 번호를 선택해 주세요.");

            // [수정] 성별과 번호를 동시에 체크하여 제출 충돌 방지
            const gender = genderSelect.value;
            const qId = query(collection(db, "participants"), where("gender", "==", gender), where("myId", "==", myNum));
            const snapId = await getDocs(qId);
            if (!snapId.empty) return alert("⚠️ 해당 번호는 이미 제출되었습니다. 번호를 다시 확인해 주세요.");

            const qPhone = query(collection(db, "participants"), where("phone", "==", phoneInput.value));
            const snapPhone = await getDocs(qPhone);
            if (!snapPhone.empty) return alert("이미 제출된 연락처입니다. 정보 회수 후 다시 제출해 주세요.");

            const picks = Array.from(document.querySelectorAll('#pick-id-grid .bubble.selected')).map(b => Number(b.innerText));
            await addDoc(collection(db, "participants"), {
                gender, myId: myNum, realName: document.getElementById('user-real-name').value,
                birth: birthInput.value, phone: phoneInput.value, pickId1: picks[0] || null, pickId2: picks[1] || null, createdAt: serverTimestamp()
            });
            alert("제출 완료!"); location.reload();
        };

        phoneInput.addEventListener('blur', async (e) => {
            if (e.target.value.length === 13 && !isResultsRevealed) {
                const q = query(collection(db, "participants"), where("phone", "==", e.target.value));
                const snap = await getDocs(q);
                withdrawBtn.style.display = !snap.empty ? 'block' : 'none';
            } else { withdrawBtn.style.display = 'none'; }
        });

        withdrawBtn.onclick = async () => {
            if (!confirm("⚠️ 정보를 삭제하시겠습니까? 삭제 후 다시 제출하실 수 있습니다.")) return;
            const q = query(collection(db, "participants"), where("phone", "==", phoneInput.value));
            const snap = await getDocs(q);
            await Promise.all(snap.docs.map(d => deleteDoc(doc(db, "participants", d.id))));
            alert("정보가 회수되었습니다."); location.reload();
        };

        document.getElementById('check-result-btn').onclick = () => {
            if (!isResultsRevealed) return alert("결과 공개 전입니다!");
            document.getElementById('result-modal').style.display = 'flex';
            verifyPhoneInput.value = "010-"; verifyPhoneInput.focus();
        };

        document.getElementById('confirm-verify-btn').onclick = async () => {
            const phone = verifyPhoneInput.value;
            const snap = await getDocs(query(collection(db, "participants"), where("phone", "==", phone)));
            if (snap.empty) return alert("등록된 정보가 없습니다.");
            const myData = snap.docs[0].data();
            myId = String(myData.myId); myGender = myData.gender;
            myCreatedAt = myData.createdAt.toDate(); 
            const now = new Date();
            const diffDays = (now - myCreatedAt) / (1000 * 60 * 60 * 24);
            const isTimeExpired = diffDays > 3;
            const opposites = (await getDocs(collection(db, "participants"))).docs.map(d => d.data()).filter(p => p.gender !== myGender);
            const matched = opposites.filter(p => (String(p.pickId1) === myId || String(p.pickId2) === myId) && [String(myData.pickId1), String(myData.pickId2)].includes(String(p.myId)));
            document.getElementById('result-modal').style.display = 'none';
            document.getElementById('input-section').style.display = 'none';
            document.getElementById('status-bar').style.display = 'none';
            document.getElementById('result-section').style.display = 'block';
            const area = document.getElementById('match-list-area');
            area.innerHTML = `<div style="background:#FFF9E6; padding:20px; border-radius:20px; margin-bottom:20px;">나의 득표수: <b>${opposites.filter(p => String(p.pickId1) === myId || String(p.pickId2) === myId).length}표</b></div>`;
            if (matched.length > 0) {
                area.innerHTML += `<h3 style="color:#FF5252;">🎉 매칭 성공!</h3>`;
                matched.forEach(p => {
                    const chatId = myGender === 'male' ? `${myId}_${p.myId}` : `${p.myId}_${myId}`;
                    if (isTimeExpired) area.innerHTML += `<div style='background:#f4f4f4; border:1px solid #ddd; padding:20px; border-radius:15px; margin-bottom:12px; opacity:0.7;'><div style='font-weight:bold; margin-bottom:10px;'>💖 ${p.myId}번님과 매칭!</div><button disabled style="width:100%; padding:12px; background:#999; color:white; border:none; border-radius:10px;">이용 기간 만료 (3일 경과)</button></div>`;
                    else area.innerHTML += `<div style='background:white; border:1px solid #eee; padding:20px; border-radius:15px; margin-bottom:12px;'><div style='font-weight:bold; margin-bottom:10px;'>💖 ${p.myId}번님과 매칭!</div><button onclick="window.enterChat('${chatId}', '${p.myId}')" style="width:100%; padding:12px; background:#1A237E; color:white; border:none; border-radius:10px; cursor:pointer;">1:1 웹 채팅 시작하기</button></div>`;
                });
            } else area.innerHTML += `<div style='background:#f4f4f4; padding:25px 20px; border-radius:15px; color:#666; line-height:1.6;'>다음번에 더 좋은 인연으로 뵐게요<br>소중한 시간 유연과 함께해주셔서 감사해요</div><a href="https://litt.ly/studioyuyeon" target="_blank" class="next-schedule-box">🗓️ 다음 일정 확인</a>`;
        };

        window.enterChat = (chatId, otherId) => {
            const currentUserIdStr = String(myId);
            const meGender = myGender === 'male' ? '남' : '여';
            const otherGender = myGender === 'male' ? '여' : '남';
            currentChatId = chatId;
            document.getElementById('result-section').style.display = 'none';
            document.getElementById('chat-section').style.display = 'block';
            if (chatUnsubscribe) chatUnsubscribe();
            const q = query(collection(db, "chats", chatId, "messages"), orderBy("createdAt", "asc"));
            chatUnsubscribe = onSnapshot(q, (snap) => {
                chatBox.innerHTML = "";
                let myMsgCount = 0;
                snap.forEach(msgDoc => {
                    const msgData = msgDoc.data();
                    const isMe = String(msgData.senderId) === currentUserIdStr;
                    if (isMe) myMsgCount++;
                    const wrapper = document.createElement('div');
                    wrapper.className = `msg-wrapper ${isMe ? 'me' : 'other'}`;
                    const label = document.createElement('div');
                    label.className = 'msg-label';
                    label.innerText = isMe ? `${meGender} ${myId}번 (나)` : `${otherGender} ${otherId}번`;
                    const msgDiv = document.createElement('div');
                    msgDiv.className = 'msg';
                    msgDiv.innerText = msgData.text;
                    wrapper.appendChild(label); wrapper.appendChild(msgDiv);
                    chatBox.appendChild(wrapper);
                });
                const now = new Date();
                const diffDays = (now - myCreatedAt) / (1000 * 60 * 60 * 24);
                document.getElementById('cookie-notice').innerHTML = `🍪 쿠키 잔량: ${COOKIE_LIMIT - myMsgCount}개 | 남은 시간: ${Math.max(0, (3 - diffDays).toFixed(1))}일<br>대화 쿠키를 모두 사용하시거나 3일이 경과하면 종료됩니다 :)`;
                if (myMsgCount >= COOKIE_LIMIT || diffDays > 3) {
                    document.getElementById('chat-input').disabled = true;
                    document.getElementById('chat-input').placeholder = "이용이 종료되었습니다.";
                }
                chatBox.scrollTop = chatBox.scrollHeight;
            });
        };

        document.getElementById('send-msg-btn').onclick = async () => {
            const text = document.getElementById('chat-input').value.trim();
            if (!text || !currentChatId || document.getElementById('chat-input').disabled) return;
            document.getElementById('chat-input').value = "";
            await addDoc(collection(db, "chats", currentChatId, "messages"), {
                senderId: String(myId), text: text, createdAt: serverTimestamp()
            });
        };
        document.getElementById('chat-input').addEventListener('keypress', (e) => { if(e.key === 'Enter') document.getElementById('send-msg-btn').click(); });
    </script>
</body>
</html>
