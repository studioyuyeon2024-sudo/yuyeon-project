<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Studio Yuyeon | 유연한 인연</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Noto+Sans+KR:wght@300;400;500;700&display=swap');
        
        body { background: #FDFBF6; font-family: 'Noto Sans KR', sans-serif; color: #333; display: flex; justify-content: center; padding: 10px; margin: 0; }
        .container { background: white; padding: 30px 20px; border-radius: 30px; box-shadow: 0 15px 40px rgba(0,0,0,0.06); width: 100%; max-width: 440px; text-align: center; border-top: 6px solid #1A237E; box-sizing: border-box; }
        .serif-title { font-family: 'Playfair Display', serif; font-size: 30px; color: #1A237E; margin-bottom: 8px; }
        .subtitle { font-size: 13px; color: #888; margin-bottom: 30px; letter-spacing: 1.2px; }

        .card { background: #FFFFFF; border: 1px solid #F0F0F0; padding: 22px; border-radius: 20px; margin-bottom: 20px; text-align: left; box-sizing: border-box; width: 100%; }
        label { font-weight: 600; font-size: 14px; color: #2C3E50; display: block; margin-bottom: 8px; }

        input, select, textarea { 
            width: 100% !important; padding: 15px !important; border: 1px solid #E5E7EB !important; border-radius: 12px !important; 
            font-size: 16px !important; box-sizing: border-box !important; background: #FAFAFA !important; display: block !important; margin-bottom: 10px;
        }

        .bubble-grid { display: grid !important; grid-template-columns: repeat(6, 1fr) !important; gap: 10px; margin: 15px 0; }
        .bubble { aspect-ratio: 1; border-radius: 50%; background: #F8F9FA; border: 1px solid #E0E0E0; display: flex; align-items: center; justify-content: center; font-size: 14px; cursor: pointer; color: #666; transition: 0.2s; }
        .bubble.selected { background: #1A237E; color: white; border-color: #1A237E; font-weight: bold; transform: scale(1.1); }

        /* 개인정보 동의 영역 레이아웃 교정 */
        .privacy-section { margin: 20px 0; text-align: left; }
        .privacy-row { display: flex; align-items: center; gap: 12px; cursor: pointer; margin-bottom: 12px; }
        .privacy-row input[type="checkbox"] { width: 22px !important; height: 22px !important; margin: 0 !important; cursor: pointer; flex-shrink: 0; }
        .privacy-row span { font-size: 15px; font-weight: bold; color: #1A237E; line-height: 1; }
        .privacy-content { font-size: 11px; color: #777; height: 100px; overflow-y: auto; background: #f9f9f9; padding: 15px; border-radius: 12px; line-height: 1.6; border: 1px solid #eee; }

        #submit-btn { width: 100%; padding: 20px; border: none; border-radius: 15px; font-weight: bold; background: #1A237E; color: white; font-size: 17px; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="serif-title">Studio Yuyeon</h1>
        <p class="subtitle">당신의 유연한 인연을 찾아가는 시간</p>
        <form id="matching-form">
            <div class="card">
                <label>성별</label><select id="user-gender"><option value="male">남성</option><option value="female">여성</option></select>
                <label>본인 번호 (1~12번)</label><div class="bubble-grid" id="my-id-grid"></div><input type="hidden" id="user-id" required>
                <label>본명</label><input type="text" id="user-real-name" placeholder="성함을 입력하세요" required>
                <label>생년월일</label><input type="tel" id="user-birth" maxlength="10" placeholder="1900-00-00" required>
                <label>핸드폰 번호</label><input type="tel" id="user-phone" maxlength="13" placeholder="010-0000-0000" required>
            </div>
            
            <div class="card"><label>호감 이성 번호 (최대 2명)</label><div class="bubble-grid" id="pick-id-grid"></div></div>
            <div class="card"><label>참여 후기 (선택)</label><textarea id="user-review" placeholder="오늘 데이팅은 어떠셨나요?"></textarea></div>
            
            <div class="privacy-section">
                <label class="privacy-row">
                    <input type="checkbox" id="privacy-check">
                    <span>개인정보 수집 및 이용 동의 (필수)</span>
                </label>
                <div class="privacy-content">
                    <strong>1. 수집 항목:</strong> 성명, 성별, 생년월일, 연락처, 매칭 번호, 후기<br>
                    <strong>2. 이용 목적:</strong> 매칭 결과 분석 및 참가자 안내<br>
                    <strong>3. 보유 기간:</strong> <strong>행사 종료 및 결과 안내 즉시 파기</strong><br>
                    <strong>4. 동의 거부:</strong> 거부 시 서비스 이용이 제한됩니다.
                </div>
            </div>

            <button type="submit" id="submit-btn">정보 제출하기</button>
        </form>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDoc, doc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        
        const firebaseConfig = { apiKey: "AIzaSyCy0qWrPE_aQGaKjJXIM_vgU8oO5Wq9mOI", authDomain: "my-dating-service.firebaseapp.com", projectId: "my-dating-service", storageBucket: "my-dating-service.firebasestorage.app", messagingSenderId: "231488184905", appId: "1:231488184905:web:d49b3e4f0ef35e524e5598" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // 입력 제한 및 자동 하이픈 (숫자만 허용)
        const applyFormat = (id, type) => {
            const el = document.getElementById(id);
            el.addEventListener('input', (e) => {
                let val = e.target.value.replace(/[^0-9]/g, '');
                if (type === 'birth') {
                    if (val.length <= 4) e.target.value = val;
                    else if (val.length <= 6) e.target.value = val.slice(0, 4) + '-' + val.slice(4);
                    else e.target.value = val.slice(0, 4) + '-' + val.slice(4, 6) + '-' + val.slice(6, 8);
                } else {
                    if (val.length <= 3) e.target.value = val;
                    else if (val.length <= 7) e.target.value = val.slice(0, 3) + '-' + val.slice(3);
                    else e.target.value = val.slice(0, 3) + '-' + val.slice(3, 7) + '-' + val.slice(7, 11);
                }
            });
        };
        applyFormat('user-birth', 'birth');
        applyFormat('user-phone', 'phone');

        // 번호 선택 그리드 생성
        const setupGrid = (gridId, targetId, limit) => {
            const grid = document.getElementById(gridId);
            const selected = [];
            for (let i = 1; i <= 12; i++) {
                const b = document.createElement('div'); b.className = 'bubble'; b.innerText = i;
                b.onclick = () => {
                    if (limit === 1) {
                        document.querySelectorAll(`#${gridId} .bubble`).forEach(x => x.classList.remove('selected'));
                        b.classList.add('selected'); document.getElementById(targetId).value = i;
                    } else {
                        if (selected.includes(i)) {
                            selected.splice(selected.indexOf(i), 1); b.classList.remove('selected');
                        } else if (selected.length < limit) {
                            selected.push(i); b.classList.add('selected');
                        }
                    }
                };
                grid.appendChild(b);
            }
            return selected;
        };
        const selectedPicks = setupGrid('pick-id-grid', '', 2);
        setupGrid('my-id-grid', 'user-id', 1);

        document.getElementById('matching-form').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn'); btn.disabled = true;
            
            const snap = await getDoc(doc(db, "settings", "matching_status"));
            if (snap.exists() && snap.data().is_open) { alert("🛑 현재 기수 접수가 마감되었습니다."); btn.disabled = false; return; }
            if (!document.getElementById('privacy-check').checked) { alert("개인정보 동의가 필요합니다."); btn.disabled = false; return; }
            if (!document.getElementById('user-id').value) { alert("본인 번호를 선택해 주세요."); btn.disabled = false; return; }

            await addDoc(collection(db, "participants"), {
                gender: document.getElementById('user-gender').value,
                myId: Number(document.getElementById('user-id').value),
                realName: document.getElementById('user-real-name').value,
                birth: document.getElementById('user-birth').value,
                phone: document.getElementById('user-phone').value,
                pickId1: selectedPicks[0] || null,
                pickId2: selectedPicks[1] || null,
                review: document.getElementById('user-review').value,
                createdAt: new Date()
            });
            alert("✅ 제출 완료! 좋은 인연이 닿기를 응원합니다."); btn.innerText = "제출 성공";
        };
    </script>
</body>
</html>
