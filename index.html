<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Studio Yuyeon | 유연한 인연</title>
    <style>
        /* [CSS 통합] 디자인 코드를 여기에 바로 넣었습니다 */
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Noto+Sans+KR:wght@300;400;500;700&display=swap');
        body { background: #FDFBF6; font-family: 'Noto Sans KR', sans-serif; color: #333; display: flex; justify-content: center; padding: 10px; margin: 0; }
        .container { background: white; padding: 30px 20px; border-radius: 30px; box-shadow: 0 15px 40px rgba(0,0,0,0.06); width: 100%; max-width: 440px; text-align: center; border-top: 6px solid #1A237E; box-sizing: border-box; }
        .serif-title { font-family: 'Playfair Display', serif; font-size: 30px; color: #1A237E; margin-bottom: 8px; }
        .subtitle { font-size: 13px; color: #888; margin-bottom: 30px; letter-spacing: 1.2px; }
        .card { background: #FFFFFF; border: 1px solid #F0F0F0; padding: 22px; border-radius: 20px; margin-bottom: 20px; text-align: left; }
        label { font-weight: 500; font-size: 14px; color: #2C3E50; display: block !important; margin-bottom: 10px; }
        input, select, textarea { width: 100% !important; padding: 13px; border: 1px solid #E5E7EB; border-radius: 12px; font-size: 15px; box-sizing: border-box; background: #FAFAFA; display: block; margin-bottom: 10px; }
        /* 번호 가로 정렬 핵심 */
        .bubble-grid { display: grid !important; grid-template-columns: repeat(6, 1fr) !important; gap: 10px; margin: 15px 0; }
        .bubble { aspect-ratio: 1; border-radius: 50%; background: #F8F9FA; border: 1px solid #E0E0E0; display: flex; align-items: center; justify-content: center; font-size: 14px; cursor: pointer; color: #666; }
        .bubble.selected { background: #1A237E; color: white; border-color: #1A237E; font-weight: bold; transform: scale(1.1); }
        #submit-btn { width: 100%; padding: 18px; border: none; border-radius: 15px; font-weight: bold; background: #1A237E; color: white; font-size: 16px; cursor: pointer; }
        .secondary-btn { width: 100%; padding: 15px; border: 1px solid #ddd; border-radius: 15px; background: white; color: #555; font-size: 14px; white-space: nowrap; cursor: pointer; letter-spacing: -0.8px; }
        .secondary-btn.active { background: #FF5252; color: white; border-color: #FF5252; }
        .privacy-content { font-size: 11px; color: #777; text-align: left; height: 100px; overflow-y: auto; background: #f9f9f9; padding: 15px; border-radius: 12px; line-height: 1.6; }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="serif-title">Studio Yuyeon</h1>
        <p class="subtitle">당신의 유연한 인연을 찾아가는 시간</p>
        <div id="input-section">
            <form id="matching-form">
                <div class="card">
                    <label>성별</label><select id="user-gender"><option value="male">남성</option><option value="female">여성</option></select>
                    <label>본인 번호 (1~12번)</label><div class="bubble-grid" id="my-id-grid"></div><input type="hidden" id="user-id" required>
                    <label>본명</label><input type="text" id="user-real-name" placeholder="성함을 입력하세요" required>
                    <label>핸드폰 번호</label><input type="tel" id="user-phone" maxlength="13" placeholder="010-0000-0000" required>
                </div>
                <div class="card">
                    <label>호감 가는 이성 번호 (최대 2명)</label><div class="bubble-grid" id="pick-id-grid"></div>
                    <div style="text-align:center; margin:10px 0; color:#ccc; font-size:12px;">또는</div>
                    <button type="button" id="skip-btn" class="secondary-btn">이번 기수에는 인연이 없었음 ❄️</button>
                    <input type="hidden" id="is-skipping" value="false">
                </div>
                <div class="field"><label>참여 후기 (선택)</label><textarea id="user-review" rows="2" placeholder="오늘 데이팅은 어떠셨나요?"></textarea></div>
                <div class="field">
                    <label style="display:flex; align-items:center; gap:8px; cursor:pointer;"><input type="checkbox" id="privacy-check" style="width:18px; height:18px;"><span style="font-size:13px; font-weight:bold;">개인정보 수집 및 이용 동의 (필수)</span></label>
                    <div class="privacy-content">
                        <strong>1. 수집 항목:</strong> 성명, 성별, 연락처, 매칭 번호, 후기<br>
                        <strong>2. 이용 목적:</strong> 매칭 결과 분석 및 참가자 안내<br>
                        <strong>3. 보유 기간:</strong> <strong>행사 종료 및 결과 안내 즉시 파기</strong><br>
                        <strong>4. 동의 거부:</strong> 거부 시 서비스 이용이 제한됩니다.
                    </div>
                </div>
                <div style="margin-top:20px;"><button type="submit" id="submit-btn">1. 정보 제출하기</button></div>
            </form>
        </div>
    </div>
    <script type="module">
        /* [JS 통합] 파이어베이스 로직을 여기에 넣으세요 (기존 config 유지) */
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, getDoc, doc, query, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        
        const firebaseConfig = { /* 여기에 우철님의 파이어베이스 설정값을 붙여넣으세요 */ };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // 버블 생성 및 로직 구현 (가로 정렬 보장)
        const myGrid = document.getElementById('my-id-grid');
        const pickGrid = document.getElementById('pick-id-grid');
        const userIdInput = document.getElementById('user-id');
        let selectedPicks = [];

        for (let i = 1; i <= 12; i++) {
            const mb = document.createElement('div'); mb.className = 'bubble'; mb.innerText = i;
            mb.onclick = () => { document.querySelectorAll('#my-id-grid .bubble').forEach(el => el.classList.remove('selected')); mb.classList.add('selected'); userIdInput.value = i; };
            myGrid.appendChild(mb);
            const pb = document.createElement('div'); pb.className = 'bubble pick-bubble'; pb.innerText = i;
            pb.onclick = () => { if (selectedPicks.includes(i)) selectedPicks = selectedPicks.filter(id => id !== i); else if (selectedPicks.length < 2) selectedPicks.push(i); updatePickView(); };
            pickGrid.appendChild(pb);
        }
        function updatePickView() { document.querySelectorAll('.pick-bubble').forEach(b => b.classList.toggle('selected', selectedPicks.includes(parseInt(b.innerText)))); }
        
        document.getElementById('matching-form').onsubmit = async (e) => {
            e.preventDefault();
            const adminDoc = await getDoc(doc(db, "settings", "matching_status"));
            if (adminDoc.exists() && adminDoc.data().is_open) return alert("접수 마감되었습니다.");
            // ... (나머지 제출 로직 동일)
            alert("제출 완료!");
        };
    </script>
</body>
</html>
