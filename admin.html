<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>유연 관리자 통제실 🔐</title>
    <link rel="stylesheet" href="./style.css">
    <style>
        .admin-container { max-width: 900px; margin: 30px auto; text-align: center; }
        .control-panel { display: flex; gap: 10px; justify-content: center; margin-bottom: 30px; }
        .control-panel button { padding: 12px 20px; border: none; border-radius: 8px; color: white; cursor: pointer; font-weight: bold; }
        #open-btn { background: #9b59b6; } #close-btn { background: #34495e; }
        #refresh-btn { background: #27ae60; } #download-btn { background: #f39c12; } #delete-btn { background: #e74c3c; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: center; }
        th { background: #34495e; color: white; }
    </style>
</head>
<body>
    <div class="admin-container">
        <h1>스튜디오 유연 리포트 📊</h1>
        <div id="auth-section">
            <input type="password" id="admin-password" placeholder="비밀번호 입력" style="padding: 10px;">
            <button onclick="checkAdmin()" style="padding: 10px;">접속</button>
        </div>

        <div id="report-section" style="display: none;">
            <div class="control-panel">
                <button id="open-btn">🔓 결과 공개 승인</button>
                <button id="close-btn">🔒 결과 공개 차단</button>
                <button id="refresh-btn">🔄 새로고침</button>
                <button id="download-btn">📥 엑셀 저장</button>
                <button id="delete-btn">⚠️ 초기화</button>
            </div>
            <h3>👥 참가자 명단</h3>
            <table>
                <thead>
                    <tr><th>번호</th><th>성별</th><th>이름</th><th>연락처</th><th>픽1</th><th>픽2</th><th>후기</th></tr>
                </thead>
                <tbody id="participant-list"></tbody>
            </table>
        </div>
    </div>
    <script type="module" src="./admin.js"></script>
</body>
</html>
