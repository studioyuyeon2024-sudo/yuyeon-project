<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yuyeon Admin | 벤토 대시보드</title>
    <style>
        /* [CSS 통합] 관리자 전용 벤토 그리드 디자인 */
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Noto+Sans+KR:wght@300;400;500;700&display=swap');
        body { background: #FDFBF6; font-family: 'Noto Sans KR', sans-serif; padding: 20px; }
        .admin-container { max-width: 950px; margin: 0 auto; background: white; padding: 30px; border-radius: 30px; border-top: 6px solid #1A237E; }
        .bento-grid { display: grid !important; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 30px; }
        .bento-card { background: white; padding: 25px; border-radius: 24px; box-shadow: 0 8px 30px rgba(0,0,0,0.04); border: 1px solid #f0f0f0; }
        .card-large { grid-column: span 2; grid-row: span 2; border-top: 5px solid #FF5252; }
        .card-medium { grid-column: span 2; border-top: 5px solid #1A237E; }
        .card-small { grid-column: span 1; border-top: 5px solid #27ae60; }
        p.main-val { font-size: 32px; font-weight: bold; color: #1A237E; margin: 10px 0; }
        .control-panel { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 25px; }
        .control-panel button { padding: 20px; border: none; border-radius: 18px; color: white; font-weight: bold; font-size: 16px; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 13px; }
        th, td { padding: 15px; border: 1px solid #eee; text-align: center; }
        th { background: #1A237E; color: white; }
    </style>
</head>
<body>
    <div class="admin-container">
        <h1 style="font-family: 'Playfair Display'; text-align: center;">Admin Dashboard</h1>
        <div id="report-section">
            <div class="bento-grid">
                <div class="bento-card card-large">
                    <h4>매칭 성공 커플 💖</h4>
                    <p id="stat-couples" class="main-val" style="color:#FF5252;">0쌍</p>
                    <div id="final-matches-mini" style="font-size: 13px; color:#555;"></div>
                </div>
                <div class="bento-card card-medium"><h4>매칭률 📊</h4><p id="stat-rate" class="main-val">0%</p></div>
                <div class="bento-card card-small"><h4>총원 👥</h4><p id="stat-total" class="main-val">0</p></div>
                <div class="bento-card card-small"><h4>남 / 여 ⚖️</h4><p id="stat-gender" class="main-val" style="font-size: 18px;">0 / 0</p></div>
            </div>
            <div class="control-panel">
                <button id="open-btn" style="background:#9b59b6;">🔓 결과 공개</button>
                <button id="close-btn" style="background:#34495e;">🔒 공개 차단</button>
                <button id="download-btn" style="background:#f39c12;">📥 명단 다운로드</button>
                <button id="delete-btn" style="background:#e74c3c;">⚠️ 초기화</button>
            </div>
            <div style="overflow-x: auto;">
                <table>
                    <thead><tr><th>#</th><th>성별</th><th>이름</th><th>연락처</th><th>픽</th><th style="color:#FF5252;">득표 🔥</th><th>후기 📝</th></tr></thead>
                    <tbody id="participant-list"></tbody>
                </table>
            </div>
        </div>
    </div>
    <script type="module">
        /* [JS 통합] 관리자 로직 (득표수 집계 포함) */
        // ... (이전 admin.js 로직 동일하게 적용)
    </script>
</body>
</html>
