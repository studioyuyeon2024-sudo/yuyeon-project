<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Studio Yuyeon Admin | 리포트 📊</title>
    <link rel="stylesheet" href="./style.css">
    <style>
        .admin-container { max-width: 1000px; margin: 30px auto; text-align: center; padding: 0 20px; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .stats-card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border-top: 4px solid #1A237E; }
        .control-panel { display: flex; gap: 10px; justify-content: center; margin-bottom: 30px; flex-wrap: wrap; }
        .control-panel button { padding: 12px 20px; border: none; border-radius: 10px; color: white; cursor: pointer; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; background: white; margin-top: 20px; }
        th, td { border: 1px solid #eee; padding: 15px; text-align: center; }
        th { background: #1A237E; color: white; }
    </style>
</head>
<body>
    <div class="admin-container">
        <h1 class="serif-title">Studio Yuyeon Admin</h1>
        <div id="auth-section" class="card" style="max-width: 350px; margin: 40px auto;">
            <input type="email" id="admin-email" placeholder="관리자 이메일" style="width: 100%; padding: 12px; margin-bottom: 10px;">
            <input type="password" id="admin-password" placeholder="비밀번호" style="width: 100%; padding: 12px; margin-bottom: 20px;">
            <button onclick="checkAdmin()" style="width: 100%; background: #1A237E; color: white; padding: 15px; border-radius: 10px;">로그인</button>
        </div>

        <div id="report-section" style="display: none;">
            <div class="stats-grid">
                <div class="stats-card"><h4>총 참가자</h4><p id="stat-total">0명</p></div>
                <div class="stats-card"><h4>남성/여성</h4><p id="stat-gender">0/0</p></div>
                <div class="stats-card"><h4>매칭 커플</h4><p id="stat-couples" style="color:#FF5252;">0쌍</p></div>
                <div class="stats-card"><h4>매칭률</h4><p id="stat-rate">0%</p></div>
            </div>
            <div class="control-panel">
                <button id="open-btn" style="background:#9b59b6;">🔓 결과 공개</button>
                <button id="close-btn" style="background:#34495e;">🔒 공개 차단</button>
                <button id="refresh-btn" style="background:#27ae60;">🔄 새로고침</button>
                <button id="download-btn" style="background:#f39c12;">📥 엑셀 저장</button>
                <button id="delete-btn" style="background:#e74c3c;">⚠️ 기수 백업 및 초기화</button>
            </div>
            <div id="final-matches-admin" style="text-align: left; margin: 30px 0;"></div>
            <table style="text-align: left;">
                <thead><tr><th>번호</th><th>성별</th><th>이름</th><th>연락처</th><th>픽1</th><th>픽2</th></tr></thead>
                <tbody id="participant-list"></tbody>
            </table>
        </div>
    </div>
    <script type="module" src="./admin.js"></script>
</body>
</html>
