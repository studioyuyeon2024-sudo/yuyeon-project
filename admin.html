<script type="module">
    // ... 기존 설정 및 초기화 로직 동일 ...
    const SEC_PW = "2024";
    const verify = () => prompt("보안 비밀번호를 입력하세요.") === SEC_PW;

    // [수정] 현재 기수 명단 다운로드 시 비밀번호 추가
    document.getElementById('download-btn').onclick = () => {
        if (!verify()) return alert("인증에 실패했습니다.");
        let csv = "\uFEFF번호,성별,이름,생일,연락처,픽1,픽2,후기\n";
        currentData.forEach(p => csv += `${p.myId},${p.gender},${p.realName},${p.birth},${p.phone},${p.pickId1||''},${p.pickId2||''},"${(p.review||'').replace(/"/g, '""')}"\n`);
        const link = document.createElement("a");
        link.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv;charset=utf-8;' }));
        link.download = `현재기수_명단_${new Date().toLocaleDateString()}.csv`;
        link.click();
    };

    // [기존 유지] 아카이브 전체 다운로드 (보안)
    document.getElementById('archive-download-btn').onclick = async () => {
        if (!verify()) return alert("비밀번호 불일치!");
        // ... (아카이브 다운로드 로직 동일) ...
    };

    // [기존 유지] 초기화: 사용자 요청에 따라 비밀번호 없이 기수명만 입력
    document.getElementById('delete-btn').onclick = async () => {
        if (currentData.length === 0) return alert("데이터 없음");
        const batchName = prompt("아카이브할 기수 명칭?");
        if (!batchName) return;
        // ... (초기화 로직 동일) ...
    };
</script>
