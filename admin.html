<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yuyeon Admin | 🔐</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="admin-container">
        <h1 class="serif-title">Admin Dashboard</h1>
        <div id="auth-section" class="card" style="max-width:380px; margin:20px auto;">
            <input type="email" id="admin-email" placeholder="관리자 이메일" style="margin-bottom:10px; width:100%;"><input type="password" id="admin-password" placeholder="비밀번호" style="margin-bottom:15px; width:100%;"><button onclick="checkAdmin()" style="width:100%; padding:15px; background:#1A237E; color:white; border-radius:10px; cursor:pointer;">로그인</button>
        </div>
        <div id="report-section" style="display: none;">
            <div class="bento-grid">
                <div class="bento-card card-large">
                    <div><h4>매칭 성공 커플 💖</h4><p id="stat-couples" style="color:#FF5252; font-size: 42px;">0쌍</p></div>
                    <div id="final-matches-mini" style="margin-top:20px; font-size: 13px; text-align: left;"></div>
                </div>
                <div class="bento-card card-medium"><h4>매칭률 📊</h4><p id="stat-rate">0%</p></div>
                <div class="bento-card card-small"><h4>총원 👥</h4><p id="stat-total">0</p></div>
                <div class="bento-card card-small"><h4>남 / 여 ⚖️</h4><p id="stat-gender" style="font-size: 20px;">0/0</p></div>
            </div>
            <div class="control-panel">
                <button id="open-btn" style="background:#9b59b6;">🔓 공개</button><button id="close-btn" style="background:#34495e;">🔒 차단</button><button id="download-btn" style="background:#f39c12;">📥 명단</button><button id="download-archive-btn" style="background:#8e44ad;">📂 백업</button><button id="refresh-btn" style="background:#27ae60; grid-column: span 2;">🔄 새로고침</button><button id="delete-btn" style="background:#e74c3c; grid-column: span 2;">⚠️ 초기화</button>
            </div>
            <div class="table-wrapper"><table><thead><tr><th>#</th><th>성별</th><th>이름</th><th>연락처</th><th>픽</th><th>득표 🔥</th><th>후기 📝</th></tr></thead><tbody id="participant-list"></tbody></table></div>
        </div>
    </div>
    <script type="module" src="./admin.js"></script>
</body>
</html>
