<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio Yuyeon | 관리자 통제실 🔐</title>
    <link rel="stylesheet" href="./style.css">
    <style>
        .admin-container { max-width: 1000px; margin: 30px auto; text-align: center; padding: 0 20px; }
        .control-panel { display: flex; gap: 10px; justify-content: center; margin-bottom: 30px; flex-wrap: wrap; }
        .control-panel button { padding: 12px 20px; border: none; border-radius: 10px; color: white; cursor: pointer; font-weight: bold; transition: 0.3s; }
        
        /* 통계 대시보드 */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .stats-card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border-top: 4px solid #1A237E; }
        .stats-card h4 { margin: 0; font-size: 14px; color: #888; }
        .stats-card p { margin: 10px 0 0; font-size: 24px; font-weight: bold; color: #1A237E; }

        /* 버튼 색상 */
        #open-btn { background: #9b59b6; } #close-btn { background: #34495e; }
        #refresh-btn { background: #27ae60; } #download-btn { background: #f39c12; } #delete-btn { background: #e74c3c; }
        #logout-btn { background: #95a5a6; margin-top: 20px; }

        table { width: 100%; border-collapse: collapse; background: white; border-radius: 15px; overflow: hidden; margin-top: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        th, td { border: 1px solid #eee; padding: 15px; text-align: center; font-size: 14px; }
        th { background: #1A237E; color: white; }
        .match-card-admin { background: #f0f4ff; padding: 15px; border-radius: 12px; margin-bottom: 10px; text-align: left; border-left: 5px solid #1A237E; }
    </style>
</head>
<body>
    <div class="admin-container">
        <h1 class="serif-title">Studio Yuyeon Admin</h1>
        
        <div id="auth-section" class="card" style="max-width: 350px; margin: 40px auto; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1);">
            <h3 style="margin-bottom: 20px;">관리자 로그인</h3>
            <input type="email" id="admin-email" placeholder="관리자 이메일" style="width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box;">
            <input type="password" id="admin-password" placeholder="비밀번호" style="width: 100%; padding: 12px; margin-bottom: 20px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box;">
            <button onclick="checkAdmin()" style="width: 100%; background: #1A237E; color: white; border: none; padding: 15px; border-radius: 10px; cursor: pointer; font-weight: bold;">접속하기</button>
        </div>

        <div id="report-section" style="display: none;">
            
            <div class="stats-grid">
                <div class="stats-card"><h4>총 참가자</h4><p id="stat-total">0명</p></div>
                <div class="stats-card"><h4>남성 / 여성</h4><p id="stat-gender">0 / 0</p></div>
                <div class="stats-card"><h4>매칭 커플</h4><p id="stat-couples" style="color: #FF5252;">0쌍</p></div>
                <div class="stats-card"><h4>매칭 성공률</h4><p id="stat-rate">0%</p></div>
            </div>

            <div class="control-panel">
                <button id="open-btn">🔓 결과 공개 승인</button>
                <button id="close-btn">🔒 결과 공개 차단</button>
                <button id="refresh-btn">🔄 새로고침</button>
                <button id="download-btn">📥 엑셀 저장</button>
                <button id="delete-btn">⚠️ 전체 초기화</button>
            </div>

            <hr style="border: 0; border-top: 1px solid #eee; margin: 40px 0;">

            <div style="text-align: left; margin-bottom: 40px;">
                <h3 style="color: #1A237E;">💖 실시간 매칭 커플</h3>
                <div id="final-matches-admin">데이터를 불러오는 중...</div>
            </div>

            <div style="text-align: left;">
                <h3 style="color: #1A237E;">👥 전체 참가자 상세 명단</h3>
                <div style="overflow-x: auto;">
                    <table>
                        <thead>
                            <tr><th>번호</th><th>성별</th><th>이름</th><th>연락처</th><th>픽1</th><th>픽2</th><th>후기</th></tr>
                        </thead>
                        <tbody id="participant-list"></tbody>
                    </table>
                </div>
            </div>

            <button id="logout-btn" onclick="handleLogout()" style="padding: 10px 20px; border: none; border-radius: 8px; color: white; cursor: pointer;">로그아웃</button>
        </div>
    </div>
    <script type="module" src="./admin.js"></script>
</body>
</html>
