<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Studio Yuyeon MASTER | 👑</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Noto+Sans+KR:wght@300;400;500;700&display=swap');
        body { background: #FDFBF6; font-family: 'Noto Sans KR', sans-serif; margin: 0; padding: 20px; box-sizing: border-box; }
        .admin-container { width: 100%; max-width: 1200px; margin: 0 auto; background: white; padding: 30px; border-radius: 30px; border-top: 8px solid #1A237E; box-shadow: 0 10px 30px rgba(0,0,0,0.05); display: none; }
        #login-section { max-width: 400px; margin: 15vh auto; background: white; padding: 40px; border-radius: 30px; box-shadow: 0 15px 40px rgba(0,0,0,0.1); text-align: center; }
        .login-input { width: 100%; padding: 15px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 12px; font-size: 16px; box-sizing: border-box; }
        .login-btn { width: 100%; padding: 18px; border: none; border-radius: 12px; background: #1A237E; color: white; font-weight: bold; cursor: pointer; }
        .bento-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin: 30px 0; }
        .bento-card { background: white; padding: 25px; border-radius: 24px; border: 1px solid #f0f0f0; text-align: left; }
        .card-large { grid-column: span 2; grid-row: span 2; border-top: 5px solid #FF5252; }
        .main-val { font-size: 32px; font-weight: bold; color: #1A237E; margin: 10px 0; }
        .control-panel { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 25px; }
        .panel-btn { padding: 15px 5px; border: none; border-radius: 15px; color: white; font-weight: bold; cursor: pointer; font-size: 14px; transition: 0.2s; line-height:1.2; }
        .panel-btn:hover { opacity: 0.8; transform: translateY(-2px); }
        .btn-purple { background: #9b59b6; } .btn-dark { background: #34495e; } .btn-orange { background: #f39c12; } .btn-red { background: #e74c3c; } .btn-blue { background: #2980b9; grid-column: span 2; } .btn-green { background: #27ae60; grid-column: span 2; }
        .table-wrapper { overflow-x: auto; border-radius: 20px; border: 1px solid #eee; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th, td { padding: 15px; border: 1px solid #f9f9f9; text-align: center; }
        th { background: #1A237E; color: white; }
        h4{line-height: 1.4; margin-bottom;10px;}
    </style>
</head>
<body>
    <div id="login-section">
        <h1 style="font-family: 'Playfair Display'; color: #1A237E;">Master Admin</h1>
        <input type="email" id="email" class="login-input" placeholder="이메일">
        <input type="password" id="password" class="login-input" placeholder="비밀번호">
        <button id="login-btn" class="login-btn">마스터 접속</button>
    </div>

    <div class="admin-container" id="admin-main">
        <h1 style="font-family: 'Playfair Display'; text-align: center; color: #1A237E;">Studio Yuyeon MASTER</h1>
        
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom:15px; flex-wrap: wrap; gap: 10px;">
            <div id="live-status" style="padding:10px 15px; border-radius:12px; font-weight:bold; font-size:14px;">상태 확인 중...</div>
            <div style="background:#E3F2FD; padding:10px 15px; border-radius:12px; font-weight:bold; font-size:14px;">
                현재 기수: <input type="text" id="set-batch-name" style="padding:5px; border-radius:5px; width:120px;" placeholder="기수명 입력">
                <button id="save-batch-btn" style="padding:5px 10px; background:#1A237E; color:white; border:none; border-radius:5px; cursor:pointer;">변경</button>
            </div>
            <div style="background:#f4f4f4; padding:10px 15px; border-radius:12px; font-weight:bold; font-size:14px;">
                인원: 
                <select id="set-total-count" style="padding:5px; border-radius:5px; font-weight:bold;">
                    <option value="6">6명</option><option value="7">7명</option><option value="8">8명</option><option value="9">9명</option><option value="10">10명</option><option value="11">11명</option><option value="12" selected>12명</option>
                </select>
            </div>
        </div>

        <div class="bento-grid">
            <div class="bento-card card-large">
                <h4 style="margin-top:0;">실시간 커플<br> 매칭 💖</h4>
                <p id="stat-couples" class="main-val" style="color:#FF5252; margin:5px 0;">0쌍</p>
                <div id="match-summary" style="font-size: 13px; line-height: 1.6; max-height: 300px; overflow-y: auto; background:#fcfcfc; border-radius:15px; padding:10px;"></div>
            </div>
            <div class="bento-card" style="border-top: 5px solid #E67E22; grid-column: span 2;"><h4>미제출자 번호 ⚠️</h4><div id="stat-missing" style="font-size: 14px; font-weight: bold; color: #E67E22; margin-top:10px;"></div></div>
            <div class="bento-card" style="border-top: 5px solid #27ae60;"><h4 style="margin-top:0;">제출</h4><p id="stat-total" class="main-val">0명</p></div>
            <div class="bento-card" style="border-top: 5px solid #f39c12;"><h4 style="margin-top:0;">성비</h4><p id="stat-gender" class="main-val" style="font-size: 22px;">0/0</p></div>
        </div>

        <div class="control-panel">
            <button id="open-btn" class="panel-btn btn-purple">🔓 결과 공개 (마감)</button>
            <button id="close-btn" class="panel-btn btn-dark">🔒 결과 차단 (재개)</button>
            <button id="download-btn" class="panel-btn btn-orange">📥 현재 기수 명단 다운</button>
            <button id="delete-btn" class="panel-btn btn-red">⚠️ 백업 후 기수 초기화</button>
            <button id="delete-selected-btn" class="panel-btn btn-dark" style="background:#e67e22;">🗑️ 선택 항목 삭제</button>
            <button id="delete-chats-btn" class="panel-btn btn-dark">🍪 쿠키삭제<br> (기수별 채팅 소거)</button>
            <button id="archive-download-btn" class="panel-btn btn-blue">🏛️ 아카이브 기록 전체 다운</button>
            <button id="refresh-btn" class="panel-btn btn-green">🔄 제출현황 새로고침</button>
        </div>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th><input type="checkbox" id="check-all"></th>
                        <th>#</th>
                        <th>성</th>
                        <th>이름</th>
                        <th>연락처</th>
                        <th>픽</th>
                        <th>득표 🔥</th>
                        <th style="width:150px;">후기 📝</th>
                    </tr>
                </thead>
                <tbody id="list-body"></tbody>
            </table>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, getDocs, doc, setDoc, onSnapshot, writeBatch, deleteDoc, query, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        
        const firebaseConfig = { apiKey: "AIzaSyCy0qWrPE_aQGaKjJXIM_vgU8oO5Wq9mOI", authDomain: "my-dating-service.firebaseapp.com", projectId: "my-dating-service", storageBucket: "my-dating-service.firebasestorage.app", messagingSenderId: "231488184905", appId: "1:231488184905:web:d49b3e4f0ef35e524e5598" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const SEC_PW = "2024";
        let currentData = [], voteMap = {}, totalLimit = 12, currentBatchName = "기본기수";

        document.getElementById('login-btn').onclick = async () => {
            try { await signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('password').value); }
            catch (e) { alert("로그인 실패!"); }
        };

        onAuthStateChanged(auth, (user) => {
            if (user) { 
                document.getElementById('login-section').style.display = 'none'; 
                document.getElementById('admin-main').style.display = 'block'; 
                initRealtimeSync(); 
                updateDashboard();
            }
        });

        // [신규] 전체 선택 기능
        document.getElementById('check-all').onchange = (e) => {
            const checkboxes = document.querySelectorAll('.row-checkbox');
            checkboxes.forEach(cb => cb.checked = e.target.checked);
        };

        // [신규] 선택 삭제 버튼 기능
        document.getElementById('delete-selected-btn').onclick = async () => {
            const checkedBoxes = document.querySelectorAll('.row-checkbox:checked');
            if (checkedBoxes.length === 0) return alert("삭제할 항목을 선택해주세요.");
            
            if (!confirm(`선택한 ${checkedBoxes.length}개의 제출 정보를 삭제하시겠습니까?\n삭제 후 참여자가 동일한 번호로 다시 제출할 수 있습니다.`)) return;
            
            try {
                const batch = writeBatch(db);
                checkedBoxes.forEach(cb => {
                    const docId = cb.getAttribute('data-id');
                    batch.delete(doc(db, "participants", docId));
                });
                await batch.commit();
                alert("삭제 완료!");
                updateDashboard();
            } catch (e) {
                alert("삭제 중 오류가 발생했습니다: " + e.message);
            }
        };

        document.getElementById('save-batch-btn').onclick = async () => {
            const name = document.getElementById('set-batch-name').value.trim();
            if(!name) return alert("기수명을 입력하세요.");
            await setDoc(doc(db, "settings", "matching_status"), { batch_name: name }, { merge: true });
            alert(`기수가 [${name}]으로 설정되었습니다.`);
            location.reload();
        };

        document.getElementById('set-total-count').onchange = async (e) => {
            await setDoc(doc(db, "settings", "matching_status"), { total_count: Number(e.target.value) }, { merge: true });
        };

        function initRealtimeSync() {
            onSnapshot(doc(db, "settings", "matching_status"), (snap) => {
                if (snap.exists()) {
                    const data = snap.data();
                    totalLimit = data.total_count || 12;
                    currentBatchName = data.batch_name || "기본기수";
                    document.getElementById('set-total-count').value = totalLimit;
                    document.getElementById('set-batch-name').value = currentBatchName;
                    const tag = document.getElementById('live-status');
                    tag.innerText = data.is_open ? "🔴 결과 공개 중" : "🟢 접수 중";
                    tag.style.background = data.is_open ? "#FF5252" : "#27ae60";
                    tag.style.color = "white";
                }
            });
        }

        async function updateDashboard() {
            const snap = await getDocs(query(collection(db, "participants"), where("batchName", "==", currentBatchName)));
            currentData = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            voteMap = {}; currentData.forEach(p => { if(p.pickId1) voteMap[p.pickId1] = (voteMap[p.pickId1]||0)+1; if(p.pickId2) voteMap[p.pickId2] = (voteMap[p.pickId2]||0)+1; });
            
            const list = document.getElementById('list-body'); list.innerHTML = "";
            currentData.sort((a,b) => Number(a.myId) - Number(b.myId)).forEach(p => {
                const pickText = (p.pickId1 || p.pickId2) ? `${p.pickId1||''}${p.pickId2 ? ', '+p.pickId2 : ''}` : '<span style="color:#aaa;">인연없음</span>';
                
                // [수정] 행마다 체크박스 추가
                list.innerHTML += `
                    <tr>
                        <td><input type="checkbox" class="row-checkbox" data-id="${p.id}"></td>
                        <td>${p.myId}</td>
                        <td>${p.gender=='male'?'남':'여'}</td>
                        <td>${p.realName}</td>
                        <td>${p.phone}</td>
                        <td>${pickText}</td>
                        <td style="color:#FF5252; font-weight:bold;">${voteMap[p.myId]||0}</td>
                        <td style="text-align:left; font-size:11px;">${p.review||'-'}</td>
                    </tr>`;
            });

            const males = currentData.filter(p => p.gender === 'male');
            const females = currentData.filter(p => p.gender === 'female');
            const mIds = males.map(p => Number(p.myId)); const fIds = females.map(p => Number(p.myId));
            const missM = []; const missF = [];
            for(let i=1; i<=totalLimit; i++) { if(!mIds.includes(i)) missM.push(i); if(!fIds.includes(i)) missF.push(i); }
            document.getElementById('stat-missing').innerHTML = `남: ${missM.join(',')}<br>여: ${missF.join(',')}`;

            const summary = document.getElementById('match-summary'); summary.innerHTML = "";
            let couples = 0;
            males.forEach(m => { females.forEach(f => {
                const mPicks = [Number(m.pickId1), Number(m.pickId2)];
                const fPicks = [Number(f.pickId1), Number(f.pickId2)];
                if (mPicks.includes(Number(f.myId)) && fPicks.includes(Number(m.myId))) {
                    couples++; 
                    summary.innerHTML += `
                        <div style="padding:10px; border-bottom:1px solid #eee; margin-bottom:8px; background:white; border-radius:10px;">
                            <b style="color:#2196F3;">남 ${m.myId} ${m.realName}</b> (${m.phone})<br>
                            <div style="text-align:center; color:#FF5252; font-size:11px; margin:4px 0;">↕ 매칭 성공 ↕</div>
                            <b style="color:#E91E63;">여 ${f.myId} ${f.realName}</b> (${f.phone})
                        </div>`;
                }
            }); });
            document.getElementById('stat-couples').innerText = `${couples}쌍`;
            document.getElementById('stat-total').innerText = `${currentData.length}명`;
            document.getElementById('stat-gender').innerText = `${males.length}/${females.length}`;
        }

        const verifyPW = () => prompt("보안 비밀번호를 입력하세요.") === SEC_PW;

        document.getElementById('download-btn').onclick = () => {
            if(!verifyPW()) return;
            let csv = "\uFEFF번호,성별,이름,생년월일,연락처,득표수,후기\n";
            currentData.sort((a,b) => Number(a.myId) - Number(b.myId)).forEach(p => {
                csv += `${p.myId},${p.gender=='male'?'남':'여'},${p.realName},${p.birth || '-'},${p.phone},${voteMap[p.myId]||0},"${(p.review || "-").replace(/"/g, '""')}"\n`;
            });
            const link = document.createElement("a"); link.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv;charset=utf-8;' }));
            link.download = `${currentBatchName}_현재명단.csv`; link.click();
        };

        document.getElementById('archive-download-btn').onclick = async () => {
            if(!verifyPW()) return;
            const snap = await getDocs(collection(db, "archive"));
            let csv = "\uFEFF기수,번호,성별,이름,생년월일,연락처,득표수,후기\n";
            snap.forEach(d => { const p = d.data(); csv += `${p.batchName},${p.myId},${p.gender=='male'?'남':'여'},${p.realName},${p.birth || '-'},${p.phone},${p.voteCount || 0},"${(p.review || "-").replace(/"/g, '""')}"\n`; });
            const link = document.createElement("a"); link.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv;charset=utf-8;' }));
            link.download = `전체아카이브기록.csv`; link.click();
        };

        document.getElementById('delete-btn').onclick = async () => {
            if(currentData.length === 0) return alert("데이터 없음");
            if(!confirm(`⚠️ 현재 [${currentBatchName}] 데이터를 백업하고 초기화하시겠습니까?`)) return;
            try {
                const batch = writeBatch(db);
                currentData.forEach(p => {
                    batch.set(doc(db, "archive", `${currentBatchName}_${p.gender}_${p.myId}`), { ...p, voteCount: (voteMap[p.myId]||0), archivedAt: new Date() });
                    batch.delete(doc(db, "participants", p.id));
                });
                await batch.commit(); alert("백업 완료!"); updateDashboard();
            } catch (e) { alert("오류: " + e.message); }
        };

        document.getElementById('delete-chats-btn').onclick = async () => {
            if(!verifyPW()) return;
            if(!confirm(`⚠️ 현재 [${currentBatchName}] 기수의 모든 대화 내용을 삭제하시겠습니까?`)) return;
            try {
                alert("정밀 소거 중...");
                for (let m = 1; m <= totalLimit; m++) {
                    for (let f = 1; f <= totalLimit; f++) {
                        const chatId = `${currentBatchName}_${m}_${f}`;
                        const msgSnap = await getDocs(collection(db, "chats", chatId, "messages"));
                        if (!msgSnap.empty) {
                            const batch = writeBatch(db);
                            msgSnap.forEach((mDoc) => batch.delete(doc(db, "chats", chatId, "messages", mDoc.id)));
                            await batch.commit();
                        }
                        await deleteDoc(doc(db, "chats", chatId));
                    }
                }
                alert(`✅ [${currentBatchName}] 기수 채팅 청소 완료!`); 
                updateDashboard();
            } catch (e) { console.error(e); }
        };

        document.getElementById('open-btn').onclick = async () => { await setDoc(doc(db, "settings", "matching_status"), { is_open: true }, { merge: true }); alert("공개됨"); };
        document.getElementById('close-btn').onclick = async () => { await setDoc(doc(db, "settings", "matching_status"), { is_open: false }, { merge: true }); alert("차단됨"); };
        document.getElementById('refresh-btn').onclick = updateDashboard;
    </script>
</body>
</html>
