<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Studio Yuyeon Admin | 🔐</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Noto+Sans+KR:wght@300;400;500;700&display=swap');
        
        body { background: #FDFBF6; font-family: 'Noto Sans KR', sans-serif; margin: 0; padding: 20px; box-sizing: border-box; }
        .admin-container { width: 100%; max-width: 1200px; margin: 0 auto; background: white; padding: 30px; border-radius: 30px; border-top: 8px solid #1A237E; box-shadow: 0 10px 30px rgba(0,0,0,0.05); display: none; }
        
        #login-section { max-width: 400px; margin: 15vh auto; background: white; padding: 40px; border-radius: 30px; box-shadow: 0 15px 40px rgba(0,0,0,0.1); text-align: center; }
        .login-input { width: 100%; padding: 15px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 12px; font-size: 16px; box-sizing: border-box; }
        .login-btn { width: 100%; padding: 18px; border: none; border-radius: 12px; background: #1A237E; color: white; font-weight: bold; cursor: pointer; }

        .bento-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin: 30px 0; }
        .bento-card { background: white; padding: 25px; border-radius: 24px; border: 1px solid #f0f0f0; text-align: left; }
        .card-large { grid-column: span 2; grid-row: span 2; border-top: 5px solid #FF5252; }
        .main-val { font-size: 32px; font-weight: bold; color: #1A237E; margin: 10px 0; }
        
        .control-panel { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 25px; }
        .panel-btn { padding: 18px; border: none; border-radius: 15px; color: white; font-weight: bold; cursor: pointer; font-size: 14px; transition: 0.2s; }
        .panel-btn:hover { opacity: 0.8; transform: translateY(-2px); }
        .btn-purple { background: #9b59b6; } .btn-dark { background: #34495e; } .btn-orange { background: #f39c12; } .btn-red { background: #e74c3c; } .btn-blue { background: #2980b9; grid-column: span 2; } .btn-green { background: #27ae60; grid-column: span 2; }

        .table-wrapper { overflow-x: auto; border-radius: 20px; border: 1px solid #eee; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th, td { padding: 15px; border: 1px solid #f9f9f9; text-align: center; }
        th { background: #1A237E; color: white; }

        @media (max-width: 768px) {
            body { padding: 10px; }
            .admin-container { padding: 15px; border-radius: 15px; }
            .bento-grid { grid-template-columns: 1fr; gap: 12px; }
            .card-large { grid-column: span 1; grid-row: auto; }
            .control-panel { grid-template-columns: 1fr; gap: 8px; }
            .main-val { font-size: 28px; }
            h1 { font-size: 20px; margin-bottom: 15px; }
            .table-wrapper table { font-size: 10px; }
            th, td { padding: 10px 4px; }
            .bento-card { padding: 20px; }
        }
    </style>
</head>
<body>
    <div id="login-section">
        <h1 style="font-family: 'Playfair Display'; color: #1A237E;">Admin Login</h1>
        <input type="email" id="email" class="login-input" placeholder="이메일">
        <input type="password" id="password" class="login-input" placeholder="비밀번호">
        <button id="login-btn" class="login-btn">대시보드 접속</button>
    </div>

    <div class="admin-container" id="admin-main">
        <h1 style="font-family: 'Playfair Display'; text-align: center; color: #1A237E;">Studio Yuyeon Dashboard</h1>
        
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom:15px; flex-wrap: wrap; gap: 10px;">
            <div id="live-status" style="padding:10px 15px; border-radius:12px; font-weight:bold; font-size:14px;">상태 확인 중...</div>
            <div style="background:#f4f4f4; padding:10px 15px; border-radius:12px; font-weight:bold; font-size:14px;">
                인원: 
                <select id="set-total-count" style="padding:5px; border-radius:5px; font-weight:bold;">
                    <option value="6">6명</option><option value="7">7명</option><option value="8">8명</option><option value="9">9명</option><option value="10">10명</option><option value="11">11명</option><option value="12" selected>12명</option>
                </select>
            </div>
        </div>

        <div class="bento-grid">
            <div class="bento-card card-large">
                <h4 style="margin-top:0;">실시간 커플 매칭 💖</h4>
                <p id="stat-couples" class="main-val" style="color:#FF5252; margin:5px 0;">0쌍</p>
                <div id="match-summary" style="font-size: 13px; line-height: 1.5; max-height: 300px; overflow-y: auto; background:#fcfcfc; border-radius:15px; padding:5px;"></div>
            </div>
            <div class="bento-card" style="border-top: 5px solid #E67E22; grid-column: span 2;">
                <h4 style="margin-top:0;">미제출자 번호 ⚠️</h4>
                <div id="stat-missing" style="font-size: 14px; font-weight: bold; color: #E67E22; margin-top:10px;"></div>
            </div>
            <div class="bento-card" style="border-top: 5px solid #27ae60;"><h4 style="margin-top:0;">제출자</h4><p id="stat-total" class="main-val">0명</p></div>
            <div class="bento-card" style="border-top: 5px solid #f39c12;"><h4 style="margin-top:0;">성비</h4><p id="stat-gender" class="main-val" style="font-size: 22px;">0/0</p></div>
        </div>

        <div class="control-panel">
            <button id="open-btn" class="panel-btn btn-purple">🔓 결과 공개 (마감)</button>
            <button id="close-btn" class="panel-btn btn-dark">🔒 결과 차단 (재개)</button>
            <button id="download-btn" class="panel-btn btn-orange">📥 현재 기수 명단 다운</button>
            <button id="delete-btn" class="panel-btn btn-red">⚠️ 백업 후 기수 초기화</button>
            <button id="delete-chats-btn" class="panel-btn btn-dark">🍪 쿠키삭제 (채팅 초기화)</button>
            <button id="archive-download-btn" class="panel-btn btn-blue">🏛️ 아카이브 기록 전체 다운</button>
            <button id="refresh-btn" class="panel-btn btn-green">🔄 제출현황 새로고침</button>
        </div>

        <div class="table-wrapper">
            <table>
                <thead><tr><th>#</th><th>성</th><th>이름</th><th>연락처</th><th>픽</th><th>득표 🔥</th><th style="width:150px;">후기 📝</th></tr></thead>
                <tbody id="list-body"></tbody>
            </table>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, getDocs, doc, setDoc, onSnapshot, writeBatch, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        
        const firebaseConfig = { apiKey: "AIzaSyCy0qWrPE_aQGaKjJXIM_vgU8oO5Wq9mOI", authDomain: "my-dating-service.firebaseapp.com", projectId: "my-dating-service", storageBucket: "my-dating-service.firebasestorage.app", messagingSenderId: "231488184905", appId: "1:231488184905:web:d49b3e4f0ef35e524e5598" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const SEC_PW = "2024";
        let currentData = [];
        let totalLimit = 12;

        document.getElementById('login-btn').onclick = async () => {
            try { await signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('password').value); }
            catch (e) { alert("로그인 실패!"); }
        };

        onAuthStateChanged(auth, (user) => {
            if (user) { 
                document.getElementById('login-section').style.display = 'none'; 
                document.getElementById('admin-main').style.display = 'block'; 
                initRealtimeSync(); 
                updateDashboard();
            }
        });

        document.getElementById('set-total-count').onchange = async (e) => {
            await setDoc(doc(db, "settings", "matching_status"), { total_count: Number(e.target.value) }, { merge: true });
        };

        function initRealtimeSync() {
            onSnapshot(doc(db, "settings", "matching_status"), (snap) => {
                if (snap.exists()) {
                    const data = snap.data();
                    totalLimit = data.total_count || 12;
                    document.getElementById('set-total-count').value = totalLimit;
                    const tag = document.getElementById('live-status');
                    tag.innerText = data.is_open ? "🔴 결과 공개 중" : "🟢 접수 중";
                    tag.style.background = data.is_open ? "#FF5252" : "#27ae60";
                    tag.style.color = "white";
                }
            });
        }

        async function updateDashboard() {
            const snap = await getDocs(collection(db, "participants"));
            currentData = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            
            const voteMap = {};
            currentData.forEach(p => { 
                if(p.pickId1) voteMap[p.pickId1] = (voteMap[p.pickId1]||0)+1; 
                if(p.pickId2) voteMap[p.pickId2] = (voteMap[p.pickId2]||0)+1; 
            });

            const list = document.getElementById('list-body'); list.innerHTML = "";
            currentData.sort((a,b) => Number(a.myId) - Number(b.myId)).forEach(p => {
                const pickText = (p.pickId1 || p.pickId2) ? `${p.pickId1||''}${p.pickId2 ? ', '+p.pickId2 : ''}` : '<span style="color:#aaa;">인연없음</span>';
                list.innerHTML += `<tr><td>${p.myId}</td><td>${p.gender=='male'?'남':'여'}</td><td>${p.realName}</td><td>${p.phone}</td><td>${pickText}</td><td style="color:#FF5252; font-weight:bold;">${voteMap[p.myId]||0}</td><td style="text-align:left; font-size:11px;">${p.review||'-'}</td></tr>`;
            });

            const males = currentData.filter(p => p.gender === 'male');
            const females = currentData.filter(p => p.gender === 'female');
            const mIds = males.map(p => Number(p.myId)); 
            const fIds = females.map(p => Number(p.myId));
            const missM = []; const missF = [];
            for(let i=1; i<=totalLimit; i++) {
                if(!mIds.includes(i)) missM.push(i);
                if(!fIds.includes(i)) missF.push(i);
            }
            document.getElementById('stat-missing').innerHTML = `남: ${missM.join(',')}<br>여: ${missF.join(',')}`;

            const summary = document.getElementById('match-summary'); summary.innerHTML = "";
            let couples = 0;
            males.forEach(m => {
                females.forEach(f => {
                    const mPicks = [m.pickId1, m.pickId2].map(id => Number(id));
                    const fPicks = [f.pickId1, f.pickId2].map(id => Number(id));
                    if (mPicks.includes(Number(f.myId)) && fPicks.includes(Number(m.myId))) {
                        couples++;
                        summary.innerHTML += `
                            <div style="padding:10px; border-bottom:1.5px solid #f0f0f0; background:white; margin-bottom:8px; border-radius:12px;">
                                <div style="color:#2196F3; font-weight:bold; font-size:12.5px;">남 ${m.myId}번 ${m.realName}</div>
                                <div style="text-align:center; color:#FF5252; font-size:10px; font-weight:bold;">↕ 매칭 ↕</div>
                                <div style="color:#E91E63; font-weight:bold; font-size:12.5px;">여 ${f.myId}번 ${f.realName}</div>
                            </div>`;
                    }
                });
            });
            document.getElementById('stat-couples').innerText = `${couples}쌍`;
            document.getElementById('stat-total').innerText = `${currentData.length}명`;
            document.getElementById('stat-gender').innerText = `${males.length}/${females.length}`;
        }

        const verify = () => prompt("보안 비밀번호를 입력하세요.") === SEC_PW;

        document.getElementById('delete-btn').onclick = async () => {
            if(currentData.length === 0) return alert("데이터가 없습니다.");
            const batchName = prompt("백업할 기수 이름 (예: 유연 133기)");
            if(!batchName || !verify()) return;
            if(!confirm("⚠️ 현재 데이터를 아카이브하고 삭제하시겠습니까?")) return;
            try {
                const batch = writeBatch(db);
                currentData.forEach(p => {
                    batch.set(doc(db, "archive", `${batchName}_${p.gender}_${p.myId}`), { ...p, batchName, archivedAt: new Date() });
                    batch.delete(doc(db, "participants", p.id));
                });
                await batch.commit();
                alert("백업 및 초기화 완료!"); updateDashboard();
            } catch (e) { alert("오류: " + e.message); }
        };

        // [정밀 타격 삭제] 유령 데이터까지 확실히 지우는 고출력 삭제 로직
        document.getElementById('delete-chats-btn').onclick = async () => {
            if(!verify()) return alert("인증 실패");
            if(!confirm("⚠️ 유령 데이터와 모든 대화 내용을 뿌리까지 삭제하시겠습니까?\n이 작업은 데이터베이스 용량을 확실히 비워줍니다.")) return;
            
            try {
                alert("데이터 정밀 소거를 시작합니다. 잠시만 기다려주세요...");
                let totalDeletedRooms = 0;
                let totalDeletedMsgs = 0;

                // 1. 모든 가능한 번호 조합(Nuclear Approach) 타격
                for (let m = 1; m <= totalLimit; m++) {
                    for (let f = 1; f <= totalLimit; f++) {
                        const chatId = `${m}_${f}`;
                        
                        // 하위 'messages' 컬렉션 직접 조회 및 삭제
                        const msgSnap = await getDocs(collection(db, "chats", chatId, "messages"));
                        if (!msgSnap.empty) {
                            const batch = writeBatch(db);
                            msgSnap.forEach((mDoc) => {
                                batch.delete(doc(db, "chats", chatId, "messages", mDoc.id));
                                totalDeletedMsgs++;
                            });
                            await batch.commit();
                        }
                        
                        // 마지막으로 상위 대화방 문서(이미 유령화된 것 포함) 삭제
                        await deleteDoc(doc(db, "chats", chatId));
                        totalDeletedRooms++;
                    }
                }

                alert(`✅ 청소 완료!\n- 시도된 경로: ${totalDeletedRooms}곳\n- 삭제된 메시지: ${totalDeletedMsgs}개\n이제 데이터베이스가 완전히 깨끗해졌습니다.`);
                location.reload(); 
            } catch (e) { 
                console.error(e);
                alert("오류 발생: " + e.message + "\n보안 규칙을 다시 확인하세요."); 
            }
        };

        document.getElementById('open-btn').onclick = async () => { 
            if (confirm("매칭 결과를 공개하시겠습니까? (참여자 접수가 마감됩니다)")) {
                await setDoc(doc(db, "settings", "matching_status"), { is_open: true }, { merge: true }); 
                alert("결과 공개됨");
            }
        };

        document.getElementById('close-btn').onclick = async () => { await setDoc(doc(db, "settings", "matching_status"), { is_open: false }, { merge: true }); alert("접수 재개됨"); };
        document.getElementById('refresh-btn').onclick = updateDashboard;
        document.getElementById('archive-download-btn').onclick = async () => {
            if(!verify()) return;
            const snap = await getDocs(collection(db, "archive"));
            let csv = "\uFEFF기수,번호,성별,이름,연락처\n";
            snap.forEach(d => { const p = d.data(); csv += `${p.batchName},${p.myId},${p.gender},${p.realName},${p.phone}\n`; });
            const link = document.createElement("a"); link.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv;charset=utf-8;' }));
            link.download = `전체_아카이브.csv`; link.click();
        };
    </script>
</body>
</html>
